<title>Devis — Couleurs du Sud</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px;-webkit-text-size-adjust:100%;min-height:100vh}
.screen{display:none;padding:12px;padding-bottom:80px;min-height:100vh}.screen.active{display:block}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:6px;position:sticky;top:0;background:#f5f4f0;z-index:100;padding:8px 0}
.topbar-title{font-size:16px;font-weight:700;color:#1a1a1a}.topbar-sub{font-size:11px;color:#999}
.icon-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:7px 10px;font-size:14px;cursor:pointer;color:#444;white-space:nowrap;display:flex;align-items:center;gap:4px}
.icon-btn.dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.icon-btn.disabled{opacity:0.3;pointer-events:none}
.save-indicator{font-size:10px;color:#27ae60;text-align:center;height:14px;margin-bottom:4px}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.card.collapsed .card-body{display:none}
.card-header{display:flex;align-items:center;gap:8px;cursor:pointer;-webkit-user-select:none;user-select:none}
.card-header .arrow{font-size:12px;color:#999;transition:transform 0.2s}
.card.collapsed .card-header .arrow{transform:rotate(-90deg)}
.card-header-title{flex:1;font-size:14px;font-weight:700;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-header-info{font-size:11px;color:#888;white-space:nowrap}
.card-body{margin-top:10px}
.stitle{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
label{font-size:12px;color:#666;display:block;margin-bottom:3px}
input[type=number],input[type=text],select,textarea{width:100%;font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fafaf8;color:#1a1a1a;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:#999}
textarea{resize:vertical;min-height:60px;font-family:-apple-system,system-ui,sans-serif}
.r4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.rbtn{background:none;border:none;cursor:pointer;font-size:16px;color:#bbb;padding:4px 8px}.rbtn:hover{color:#e74c3c}
.dupbtn{background:none;border:none;cursor:pointer;font-size:15px;color:#bbb;padding:4px 6px}.dupbtn:hover{color:#3498db}
.addbtn{width:100%;padding:10px;border:1px dashed #ccc;border-radius:8px;background:none;cursor:pointer;font-size:13px;color:#888;margin-bottom:10px}.addbtn:hover{background:#f0efeb}
.div{border:none;border-top:1px solid #eee;margin:10px 0}
.sl{font-size:11px;color:#999;margin:8px 0 6px;font-weight:600}
.prev{font-size:11px;color:#27ae60;margin-top:4px;min-height:14px;font-weight:500}
.prow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:6px;margin-bottom:6px;min-height:30px}
.prow-left{display:flex;align-items:center;gap:6px;font-size:13px;color:#1a1a1a}
.prow-left input[type=checkbox]{width:18px;height:18px;margin:0;flex-shrink:0}
.zsel{font-size:11px;padding:4px 6px;border:1px solid #ddd;border-radius:6px;background:#fafaf8;color:#1a1a1a;width:auto}
.surf-tag{font-size:10px;color:#aaa;background:#f0f0f0;padding:2px 6px;border-radius:4px;white-space:nowrap}
.ck-label{display:flex;align-items:center;gap:6px;font-size:13px;color:#1a1a1a;cursor:pointer;margin:0}.ck-label input{width:18px;height:18px;margin:0}
.men-row{display:grid;grid-template-columns:1fr 60px 80px 28px;gap:6px;align-items:end;margin-bottom:6px}
.volet-row{display:grid;grid-template-columns:1fr 1fr 80px 60px 28px;gap:6px;align-items:end;margin-bottom:2px}
.volet-prix{font-size:11px;font-weight:600;color:#27ae60;text-align:right;margin-bottom:8px;min-height:14px}
.mb{border:1px solid #eee;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.mt{font-size:12px;font-weight:700;color:#333;margin-bottom:6px}
.note-toggle{font-size:11px;color:#888;cursor:pointer;border:none;background:none;padding:5px 0;text-align:left;margin-top:4px;display:inline-block}.note-toggle:hover{color:#666}
.note-zone{margin-top:6px}.hidden{display:none}
.canvas-wrap{position:relative;margin-top:6px;border:1px solid #ddd;border-radius:8px;overflow:hidden;background:#fff;touch-action:none}
.canvas-wrap canvas{display:block;touch-action:none}
.canvas-toolbar{display:flex;gap:6px;padding:6px 8px;background:#fafaf8;border-bottom:1px solid #eee;align-items:center}
.canvas-toolbar button{background:none;border:1px solid #ddd;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;color:#444}
.canvas-toolbar button.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.total-block{background:#1a1a1a;color:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.total-block .line{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
.total-block .line.big{font-size:18px;font-weight:700;margin-top:8px;padding-top:8px;border-top:1px solid #444}
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{text-align:left;font-size:10px;font-weight:700;color:#999;padding:6px;border-bottom:1px solid #eee}
.rt td{padding:6px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;vertical-align:top}
.rt .sr td{font-weight:700;background:#f5f4f0;font-size:11px;color:#666;padding:4px 6px}
.rr{text-align:right}
.euro{transition:opacity 0.15s}.hide-prices .euro{opacity:0;pointer-events:none}
.hist-item{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.hist-info{flex:1;min-width:0}.hist-name{font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-date{font-size:11px;color:#999;margin-top:2px}.hist-total{font-size:13px;font-weight:700;color:#1a1a1a}
.hist-actions{display:flex;gap:6px;flex-shrink:0}
.hist-btn{border:1px solid #ddd;background:none;border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer;color:#444}.hist-btn.red{color:#e74c3c;border-color:#e74c3c}
.empty-state{text-align:center;color:#bbb;font-size:13px;padding:40px 0}
.bottom-actions{display:flex;gap:8px;margin-top:8px;margin-bottom:20px}
.bottom-actions button{flex:1;padding:12px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;background:none;border:1px solid #ccc;color:#666}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:flex-end;justify-content:center}.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:12px}
.modal input{width:100%;font-size:15px;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px}
.modal-btns{display:flex;gap:8px}.modal-btns button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-confirm{background:#1a1a1a;color:#fff;border:none}.btn-cancel{background:none;border:1px solid #ccc;color:#666}
.sticky-total{position:fixed;bottom:0;left:0;right:0;background:#1a1a1a;color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;z-index:200;box-shadow:0 -2px 12px rgba(0,0,0,0.3)}
.sticky-total-label{font-size:12px;color:#aaa}
.sticky-total-amount{font-size:20px;font-weight:700}
.smanu-hint{font-size:10px;color:#f0a000;margin-top:2px}
@media print{body>*:not(#pdf-overlay){display:none!important}#pdf-overlay{position:static!important;overflow:visible!important}#pdf-overlay .no-print{display:none!important}}
.movbtn{background:none;border:none;cursor:pointer;font-size:11px;color:#ccc;padding:2px 3px;line-height:1}.movbtn:hover{color:#27ae60}
@media (prefers-color-scheme: dark){
  body{background:#111;color:#e8e8e8}
  .screen{background:#111}
  .topbar{background:#111}
  .card{background:#1e1e1e;border-color:#2e2e2e}
  .card-header-title{color:#e8e8e8}
  .total-block{background:#000}
  .hist-item{background:#1e1e1e;border-color:#2e2e2e}
  .hist-name{color:#e8e8e8}.hist-total{color:#e8e8e8}
  .icon-btn{background:#1e1e1e;border-color:#3a3a3a;color:#ccc}

  input[type=number],input[type=text],select,textarea{background:#1e1e1e;border-color:#3a3a3a;color:#e8e8e8}
  label{color:#999}.topbar-title{color:#e8e8e8}.topbar-sub{color:#666}

  .addbtn{border-color:#3a3a3a;color:#777}.addbtn:hover{background:#1e1e1e}

  .note-toggle{color:#666}.hist-date{color:#666}
  .hist-btn{border-color:#3a3a3a;color:#aaa}
  .rt td{color:#e8e8e8;border-color:#2e2e2e}.rt th{color:#666;border-color:#2e2e2e}
  .rt .sr td{background:#111;color:#888}
  .zsel{background:#1e1e1e;border-color:#3a3a3a;color:#e8e8e8}
  .surf-tag{background:#2a2a2a;color:#777}
  .card-header-info{color:#666}.rbtn{color:#555}.dupbtn{color:#555}.movbtn{color:#555}

}

<body>

<div class="screen active" id="screen-history">
  <div class="topbar">
    <div><div class="topbar-title">📋 Devis</div><div class="topbar-sub">Couleurs du Sud</div></div>
    <button class="icon-btn dark" onclick="newDevis()">+ Nouveau</button>
  </div>
  <div style="margin-bottom:8px"><input type="text" id="hist-search" placeholder="🔍 Rechercher un devis..." oninput="renderHistory()"></div>
  <div id="hist-list"></div>
</div>

<div class="screen" id="screen-calc">
  <div class="topbar">
    <button class="icon-btn" onclick="showHistory()">← Retour</button>
    <button class="icon-btn disabled" id="undoBtn" onclick="undo()">↩</button>
    <div style="flex:1;text-align:center">
      <div id="devis-name-display" style="font-size:14px;font-weight:700;color:#1a1a1a;cursor:pointer" onclick="renameDevis()">—</div>
      <div id="devis-date-display" style="font-size:10px;color:#999"></div>
    </div>
    <button class="icon-btn" onclick="togglePrices()">👁 <span id="eyeText">Masquer</span></button>
  </div>
  <div class="save-indicator" id="save-indicator"></div>
  <div class="stitle" style="margin-bottom:8px">Pièces</div>
  <div id="pc"></div>
  <button class="addbtn" onclick="addP()">+ Ajouter une pièce</button>
  <div class="card">
    <div class="stitle" style="margin-bottom:8px">Forfaits généraux</div>
    <label class="ck-label"><input type="checkbox" id="f-echaf" onchange="snap();autoSave()"> Montage/démontage échafaudage (<span class="euro">450 €</span>)</label>
  </div>
  <div class="card">
    <div class="stitle" style="margin-bottom:10px">Volets</div>
    <div class="mb"><div class="mt">Volets bois (<span class="euro">90 €/m²</span> · 2 faces)</div><div id="vl"></div><button class="addbtn" style="margin-bottom:0;margin-top:4px" onclick="addVolet()">+ Ajouter un volet</button><button class="note-toggle" onclick="toggleZone('note-volets')">✏️ Notes</button><div class="note-zone hidden" id="note-volets"><textarea placeholder="Notes volets..." onfocus="snap()" oninput="autoSave()"></textarea></div></div>
  </div>
  <div id="rz">
    <div class="total-block" id="total-block"><div class="line big"><span>Total HT</span><span class="euro" id="total-ht-line">0,00 €</span></div></div>
    <div class="card"><table class="rt" id="rtbl"></table></div>
    <div class="bottom-actions">
      <button onclick="copyR()">📋 Copier MEG</button>
      <button onclick="exportPDF()">📄 Exporter PDF</button>
    </div>
  </div>
</div>

<div class="sticky-total hide-on-history" id="sticky-total" style="display:none">
  <span class="sticky-total-label">Total HT</span>
  <span class="sticky-total-amount euro" id="sticky-total-amount">0,00 €</span>
</div>

<div class="modal-overlay hidden" id="rename-modal">
  <div class="modal"><h3>Nommer le devis</h3><input type="text" id="rename-input" placeholder="Nom du client..." autocomplete="off"><div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">Annuler</button><button class="btn-confirm" onclick="confirmRename()">Valider</button></div></div>
</div>

<script>
let pricesHidden=false,currentDevisId=null;
let pieces=[],pCnt=0,portes=[],ptCnt=0,fens=[],fCnt=0,volets=[],vCnt=0;
let saveTimer=null,canvases={};
let undoStack=[],lastSnap=null;
const MAX_UNDO=40;

const PREST=[
  {id:'detap',label:'Détapissage',pu:5,u:'m²',zone:'murs'},
  {id:'impres',label:'Impression glycéro',pu:6,u:'m²',zone:'choice',def:'murs'},
  {id:'enduit',label:'Enduit de rebouchage',pu:15,u:'m²',zone:'choice',def:'murs'},
  {id:'peint',label:'Mise en peinture',pu:16.5,u:'m²',zone:'choice',def:'both'},
  {id:'papier',label:'Pose papier peint (colle fournie)',pu:55,u:'m²',zone:'murs'},
  {id:'chaux',label:'Chaux brossée Ressource',pu:47,u:'m²',zone:'murs'},
  {id:'sol',label:'Pose de sol (fourniture client)',pu:25,u:'m²',zone:'plaf'},
  {id:'dep_pl',label:'Dépose et évacuation plinthes',pu:6,u:'ML',zone:'ml'},
  {id:'four_pl',label:'Fourniture plinthe bois',pu:18,u:'ML',zone:'ml'},
  {id:'peint_pl2',label:'Peinture plinthe bois',pu:8,u:'ML',zone:'ml'},
];
const PRIX_P={'classique':{label:'Porte classique',p1:70,p2:140},'entree':{label:"Porte d'entrée",p1:150,p2:280},'petit_s':{label:'Petit carreau simple',p1:110,p2:220},'petit_d':{label:'Petit carreau double',p1:175,p2:350},'placard_s':{label:'Placard simple',p1:70,p2:140},'placard_d':{label:'Placard double',p1:125,p2:250}};
const PRIX_F={'simple':{label:'Fenêtre simple',p1:70,p2:120},'double':{label:'Fenêtre double',p1:140,p2:250},'pf_simple':{label:'Porte-fenêtre simple',p1:120,p2:220},'pf_double':{label:'Porte-fenêtre double',p1:240,p2:450}};

function snap(){const s=JSON.stringify(captureState());if(s===lastSnap)return;undoStack.push(s);if(undoStack.length>MAX_UNDO)undoStack.shift();lastSnap=s;updateUndoBtn();}
function updateUndoBtn(){const b=document.getElementById('undoBtn');if(b){if(undoStack.length>0)b.classList.remove('disabled');else b.classList.add('disabled');}}
function undo(){if(!undoStack.length)return;const s=JSON.parse(undoStack.pop());pieces=[];pCnt=0;portes=[];ptCnt=0;fens=[];fCnt=0;volets=[];vCnt=0;canvases={};document.getElementById('f-echaf').checked=false;document.getElementById('pc').innerHTML='';document.getElementById('vl').innerHTML='';try{document.querySelector('#note-volets textarea').value='';}catch(e){}restoreState(s);saveCurrentDevis();lastSnap=JSON.stringify(captureState());updateUndoBtn();const ind=document.getElementById('save-indicator');if(ind){ind.textContent='↩ Annulé';setTimeout(()=>ind.textContent='',2000);}calcAuto();}

function loadHistory(){try{return JSON.parse(localStorage.getItem('cds_v4')||'[]');}catch(e){return[];}}
function saveHistory(h){localStorage.setItem('cds_v4',JSON.stringify(h));}
function todayStr(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}
function autoSave(){
  calcAuto();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{saveCurrentDevis();const ind=document.getElementById('save-indicator');if(ind){ind.textContent='✓ Sauvegardé';setTimeout(()=>ind.textContent='',1500);}},400);
}

function showHistory(){saveCurrentDevis();document.getElementById('screen-calc').classList.remove('active');document.getElementById('screen-history').classList.add('active');document.getElementById('sticky-total').style.display='none';renderHistory();}
function renderHistory(){const q=(document.getElementById('hist-search')?.value||'').toLowerCase().trim();const all=loadHistory(),h=q?all.filter(d=>d.name.toLowerCase().includes(q)):all;const c=document.getElementById('hist-list');if(!h.length){c.innerHTML=`<div class="empty-state">${q?'Aucun résultat':'Aucun devis<br>Appuyez sur "+ Nouveau"'}</div>`;return;}c.innerHTML=h.map(d=>`<div class="hist-item"><div class="hist-info"><div class="hist-name">${d.name}</div><div class="hist-date">${d.date}</div></div><div class="hist-total euro">${d.total?d.total.toFixed(2)+' € HT':'—'}</div><div class="hist-actions"><button class="hist-btn" onclick="openDevis('${d.id}')">Ouvrir</button><button class="hist-btn red" onclick="deleteDevis('${d.id}')">✕</button></div></div>`).join('');}
function newDevis(){const id='d_'+Date.now(),h=loadHistory();h.unshift({id,name:'Nouveau devis',date:todayStr(),total:null,data:null});if(h.length>20)h.splice(20);saveHistory(h);loadDevis(id);}
function openDevis(id){loadDevis(id);}
function deleteDevis(id){if(!confirm('Supprimer ce devis ?'))return;let h=loadHistory();h=h.filter(d=>d.id!==id);saveHistory(h);renderHistory();}
function loadDevis(id){currentDevisId=id;undoStack=[];lastSnap=null;updateUndoBtn();const h=loadHistory(),entry=h.find(d=>d.id===id)||{name:'Nouveau devis',date:todayStr(),data:null};pieces=[];pCnt=0;portes=[];ptCnt=0;fens=[];fCnt=0;volets=[];vCnt=0;canvases={};document.getElementById('f-echaf').checked=false;document.getElementById('pc').innerHTML='';document.getElementById('vl').innerHTML='';try{document.querySelector('#note-volets textarea').value='';document.getElementById('note-volets').classList.add('hidden');}catch(e){}if(entry.data)restoreState(entry.data);else addP();document.getElementById('devis-name-display').textContent=entry.name;document.getElementById('devis-date-display').textContent=entry.date;document.getElementById('screen-history').classList.remove('active');document.getElementById('screen-calc').classList.add('active');document.getElementById('sticky-total').style.display='flex';lastSnap=JSON.stringify(captureState());calcAuto();}
function saveCurrentDevis(){if(!currentDevisId)return;const h=loadHistory(),idx=h.findIndex(d=>d.id===currentDevisId);if(idx===-1)return;h[idx].data=captureState();if(window._lastTotal!==undefined)h[idx].total=window._lastTotal;saveHistory(h);}

function captureState(){
  const state={pieces:[],echaf:document.getElementById('f-echaf')?.checked||false,volets:[],nv:document.querySelector('#note-volets textarea')?.value||'',nvo:!document.getElementById('note-volets')?.classList.contains('hidden')};
  pieces.forEach(p=>{
    const pi={id:p.id,nom:document.getElementById(`pnom-${p.id}`)?.value||'',m1:document.getElementById(`m1-${p.id}`)?.value||'',m2:document.getElementById(`m2-${p.id}`)?.value||'',hh:document.getElementById(`hh-${p.id}`)?.value||'',nm:document.getElementById(`nm-${p.id}`)?.value||'4',smanu:document.getElementById(`smanu-${p.id}`)?.value||'',plaf:document.getElementById(`plaf-${p.id}`)?.value||'',haspl:document.getElementById(`has-pl-${p.id}`)?.checked||false,note:document.querySelector(`#note-p-${p.id} textarea`)?.value||'',no:!document.getElementById(`note-p-${p.id}`)?.classList.contains('hidden'),co:!document.getElementById(`canvas-wrap-${p.id}`)?.classList.contains('hidden'),cd:canvases[p.id]?canvases[p.id].toDataURL():'',collapsed:document.getElementById(`pc-${p.id}`)?.classList.contains('collapsed')||false,prests:{},
      portes:portes.filter(po=>po.pid===p.id).map(po=>({id:po.id,typ:document.getElementById(`ptyp-${po.id}`)?.value||'classique',qte:document.getElementById(`pqte-${po.id}`)?.value||'1',face:document.getElementById(`pface-${po.id}`)?.value||'2'})),
      fens:fens.filter(f=>f.pid===p.id).map(f=>({id:f.id,typ:document.getElementById(`ftyp-${f.id}`)?.value||'simple',qte:document.getElementById(`fqte-${f.id}`)?.value||'1',face:document.getElementById(`fface-${f.id}`)?.value||'2'})),
      np:document.querySelector(`#note-portes-${p.id} textarea`)?.value||'',nf:document.querySelector(`#note-fenetres-${p.id} textarea`)?.value||'',
      npo:!document.getElementById(`note-portes-${p.id}`)?.classList.contains('hidden'),nfo:!document.getElementById(`note-fenetres-${p.id}`)?.classList.contains('hidden')};
    PREST.forEach(pr=>{pi.prests[pr.id]={ck:document.getElementById(`ck-${pr.id}-${p.id}`)?.checked||false,zone:document.getElementById(`zone-${pr.id}-${p.id}`)?.value||(pr.def||'murs')};});state.pieces.push(pi);});
  volets.forEach(vo=>state.volets.push({id:vo.id,l:document.getElementById(`vl-${vo.id}`)?.value||'',h:document.getElementById(`vh-${vo.id}`)?.value||'',q:document.getElementById(`vq-${vo.id}`)?.value||'1'}));
  return state;
}

function restoreState(s){
  document.getElementById('f-echaf').checked=s.echaf||false;
  s.pieces.forEach(p=>{pCnt=Math.max(pCnt,p.id);pieces.push({id:p.id});});renderP();
  s.pieces.forEach(pi=>{const id=pi.id,sv=(eid,val)=>{const e=document.getElementById(eid);if(e)e.value=val||'';};sv(`pnom-${id}`,pi.nom);sv(`m1-${id}`,pi.m1);sv(`m2-${id}`,pi.m2);sv(`hh-${id}`,pi.hh);sv(`nm-${id}`,pi.nm||'4');sv(`smanu-${id}`,pi.smanu||'');sv(`plaf-${id}`,pi.plaf);const hp=document.getElementById(`has-pl-${id}`);if(hp)hp.checked=pi.haspl||false;const nt=document.querySelector(`#note-p-${id} textarea`);if(nt)nt.value=pi.note||'';if(pi.no)document.getElementById(`note-p-${id}`)?.classList.remove('hidden');if(pi.co)document.getElementById(`canvas-wrap-${id}`)?.classList.remove('hidden');if(pi.collapsed)document.getElementById(`pc-${id}`)?.classList.add('collapsed');if(pi.cd&&pi.cd.length>100)setTimeout(()=>{initCanvas(id);if(canvases[id]){const img=new Image();img.onload=()=>canvases[id].getContext('2d').drawImage(img,0,0);img.src=pi.cd;}},50);
    PREST.forEach(pr=>{const ck=document.getElementById(`ck-${pr.id}-${id}`),zo=document.getElementById(`zone-${pr.id}-${id}`);if(ck&&pi.prests?.[pr.id])ck.checked=pi.prests[pr.id].ck||false;if(zo&&pi.prests?.[pr.id])zo.value=pi.prests[pr.id].zone||(pr.def||'murs');});
    (pi.portes||[]).forEach(p=>{ptCnt=Math.max(ptCnt,p.id);portes.push({id:p.id,pid:id});});renderPortesPiece(id);
    (pi.portes||[]).forEach(p=>{sv(`ptyp-${p.id}`,p.typ);sv(`pqte-${p.id}`,p.qte);sv(`pface-${p.id}`,p.face);});
    (pi.fens||[]).forEach(f=>{fCnt=Math.max(fCnt,f.id);fens.push({id:f.id,pid:id});});renderFensPiece(id);
    (pi.fens||[]).forEach(f=>{sv(`ftyp-${f.id}`,f.typ);sv(`fqte-${f.id}`,f.qte);sv(`fface-${f.id}`,f.face);});
    if(pi.np){const el=document.querySelector(`#note-portes-${id} textarea`);if(el)el.value=pi.np;}
    if(pi.nf){const el=document.querySelector(`#note-fenetres-${id} textarea`);if(el)el.value=pi.nf;}
    if(pi.npo)document.getElementById(`note-portes-${id}`)?.classList.remove('hidden');
    if(pi.nfo)document.getElementById(`note-fenetres-${id}`)?.classList.remove('hidden');
    updMurVisibility(id);upd(id);});
  (s.volets||[]).forEach(vo=>{vCnt=Math.max(vCnt,vo.id);volets.push({id:vo.id});});renderVolets();
  (s.volets||[]).forEach(vo=>{const sv2=(eid,val)=>{const e=document.getElementById(eid);if(e)e.value=val||'';};sv2(`vl-${vo.id}`,vo.l);sv2(`vh-${vo.id}`,vo.h);sv2(`vq-${vo.id}`,vo.q);updVolet(vo.id);});
  if(s.nv)document.querySelector('#note-volets textarea').value=s.nv;
  if(s.nvo)document.getElementById('note-volets').classList.remove('hidden');
}

function renameDevis(){document.getElementById('rename-input').value=document.getElementById('devis-name-display').textContent;document.getElementById('rename-modal').classList.remove('hidden');setTimeout(()=>document.getElementById('rename-input').focus(),100);}
function closeModal(){document.getElementById('rename-modal').classList.add('hidden');}
function confirmRename(){const val=document.getElementById('rename-input').value.trim();if(!val){closeModal();return;}document.getElementById('devis-name-display').textContent=val;const h=loadHistory(),idx=h.findIndex(d=>d.id===currentDevisId);if(idx>-1){h[idx].name=val;saveHistory(h);}closeModal();}
document.getElementById('rename-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmRename();});

function initCanvas(id){const canvas=document.getElementById(`canvas-${id}`);if(!canvas||canvases[id])return;canvas.width=canvas.offsetWidth||600;canvas.height=200;const ctx=canvas.getContext('2d');ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round';canvases[id]=canvas;let drawing=false,erasing=false;
  function getPos(e){const r=canvas.getBoundingClientRect(),sx=canvas.width/r.width,sy=canvas.height/r.height;if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};}
  function startDraw(e){e.preventDefault();snap();drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function draw(e){if(!drawing)return;e.preventDefault();const p=getPos(e);if(erasing)ctx.clearRect(p.x-12,p.y-12,24,24);else{ctx.lineTo(p.x,p.y);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y);}}
  function stopDraw(){if(drawing){drawing=false;autoSave();}}
  canvas.addEventListener('touchstart',startDraw,{passive:false});canvas.addEventListener('touchmove',draw,{passive:false});canvas.addEventListener('touchend',stopDraw);canvas.addEventListener('mousedown',startDraw);canvas.addEventListener('mousemove',draw);canvas.addEventListener('mouseup',stopDraw);canvas.addEventListener('mouseleave',stopDraw);
  document.getElementById(`btn-pen-${id}`).onclick=()=>{erasing=false;ctx.lineWidth=1.5;ctx.strokeStyle=document.getElementById(`btn-color-${id}`).value;document.getElementById(`btn-pen-${id}`).classList.add('active');document.getElementById(`btn-eraser-${id}`).classList.remove('active');};
  document.getElementById(`btn-eraser-${id}`).onclick=()=>{erasing=true;document.getElementById(`btn-eraser-${id}`).classList.add('active');document.getElementById(`btn-pen-${id}`).classList.remove('active');};
  document.getElementById(`btn-clear-${id}`).onclick=()=>{snap();ctx.clearRect(0,0,canvas.width,canvas.height);autoSave();};
  document.getElementById(`btn-color-${id}`).oninput=e=>ctx.strokeStyle=e.target.value;}

function toggleCollapse(id){const card=document.getElementById(`pc-${id}`);if(card)card.classList.toggle('collapsed');autoSave();}

function addP(){
  const id=++pCnt;
  pieces.push({id});
  const div=buildPieceDiv(id);
  document.getElementById('pc').appendChild(div);
  autoSave();
  setTimeout(()=>div.scrollIntoView({behavior:'smooth',block:'start'}),50);
}
function removeP(id){const hasDims=parseFloat(document.getElementById(`m1-${id}`)?.value)||0;const hasPrests=PREST.some(pr=>document.getElementById(`ck-${pr.id}-${id}`)?.checked);const hasPortes=portes.some(p=>p.pid===id);const hasFens=fens.some(f=>f.pid===id);if((hasDims||hasPrests||hasPortes||hasFens)&&!confirm('Supprimer cette pièce ?'))return;snap();pieces=pieces.filter(p=>p.id!==id);portes=portes.filter(p=>p.pid!==id);fens=fens.filter(f=>f.pid!==id);document.getElementById(`pc-${id}`)?.remove();delete canvases[id];autoSave();}
function renderP(){const c=document.getElementById('pc');c.innerHTML='';pieces.forEach(p=>{c.appendChild(buildPieceDiv(p.id));});}

function dupP(id){
  snap();
  const newId=++pCnt;
  pieces.push({id:newId});
  const div=buildPieceDiv(newId);
  const ref=document.getElementById(`pc-${id}`);
  ref.after(div);
  ['pnom','m1','m2','hh','plaf','smanu'].forEach(f=>{const src=document.getElementById(`${f}-${id}`),dst=document.getElementById(`${f}-${newId}`);if(src&&dst)dst.value=src.value;});
  ['nm'].forEach(f=>{const src=document.getElementById(`${f}-${id}`),dst=document.getElementById(`${f}-${newId}`);if(src&&dst)dst.value=src.value;});
  const hpSrc=document.getElementById(`has-pl-${id}`),hpDst=document.getElementById(`has-pl-${newId}`);if(hpSrc&&hpDst)hpDst.checked=hpSrc.checked;
  PREST.forEach(pr=>{const ckSrc=document.getElementById(`ck-${pr.id}-${id}`),ckDst=document.getElementById(`ck-${pr.id}-${newId}`);if(ckSrc&&ckDst)ckDst.checked=ckSrc.checked;const zoSrc=document.getElementById(`zone-${pr.id}-${id}`),zoDst=document.getElementById(`zone-${pr.id}-${newId}`);if(zoSrc&&zoDst)zoDst.value=zoSrc.value;});
  const noteSrc=document.querySelector(`#note-p-${id} textarea`),noteDst=document.querySelector(`#note-p-${newId} textarea`);if(noteSrc&&noteDst)noteDst.value=noteSrc.value;
  if(!document.getElementById(`note-p-${id}`)?.classList.contains('hidden'))document.getElementById(`note-p-${newId}`)?.classList.remove('hidden');
  // Duplicate per-piece portes
  const srcPortes=portes.filter(p=>p.pid===id);
  const newPorteMap=srcPortes.map(sp=>{const nid=++ptCnt;portes.push({id:nid,pid:newId});return{src:sp.id,dst:nid};});
  renderPortesPiece(newId);
  newPorteMap.forEach(({src,dst})=>{['ptyp','pqte','pface'].forEach(f=>{const s=document.getElementById(`${f}-${src}`),d=document.getElementById(`${f}-${dst}`);if(s&&d)d.value=s.value;});});
  // Duplicate per-piece fens
  const srcFens=fens.filter(f=>f.pid===id);
  const newFenMap=srcFens.map(sf=>{const nid=++fCnt;fens.push({id:nid,pid:newId});return{src:sf.id,dst:nid};});
  renderFensPiece(newId);
  newFenMap.forEach(({src,dst})=>{['ftyp','fqte','fface'].forEach(f=>{const s=document.getElementById(`${f}-${src}`),d=document.getElementById(`${f}-${dst}`);if(s&&d)d.value=s.value;});});
  const npSrc=document.querySelector(`#note-portes-${id} textarea`),npDst=document.querySelector(`#note-portes-${newId} textarea`);if(npSrc&&npDst)npDst.value=npSrc.value;
  if(!document.getElementById(`note-portes-${id}`)?.classList.contains('hidden'))document.getElementById(`note-portes-${newId}`)?.classList.remove('hidden');
  const nfSrc=document.querySelector(`#note-fenetres-${id} textarea`),nfDst=document.querySelector(`#note-fenetres-${newId} textarea`);if(nfSrc&&nfDst)nfDst.value=nfSrc.value;
  if(!document.getElementById(`note-fenetres-${id}`)?.classList.contains('hidden'))document.getElementById(`note-fenetres-${newId}`)?.classList.remove('hidden');
  updMurVisibility(newId);upd(newId);
  setTimeout(()=>div.scrollIntoView({behavior:'smooth',block:'start'}),50);
  autoSave();
}

function updHeader(id){const nom=document.getElementById(`pnom-${id}`)?.value||'';document.getElementById(`header-title-${id}`).textContent=nom||'Nouvelle pièce';}

function updMurVisibility(id){
  const nm=parseInt(document.getElementById(`nm-${id}`)?.value)||4;
  const m2wrap=document.getElementById(`m2wrap-${id}`);
  if(m2wrap)m2wrap.style.display=nm===1?'none':'';
  upd(id);
}

function getSurf(id){
  const smanuVal=parseFloat(document.getElementById(`smanu-${id}`)?.value)||0;
  const m1=parseFloat(document.getElementById(`m1-${id}`)?.value)||0,m2=parseFloat(document.getElementById(`m2-${id}`)?.value)||0,h=parseFloat(document.getElementById(`hh-${id}`)?.value)||2.5,nm=parseInt(document.getElementById(`nm-${id}`)?.value)||4,plafIn=parseFloat(document.getElementById(`plaf-${id}`)?.value)||0,hasPl=document.getElementById(`has-pl-${id}`)?.checked;
  let murs=0,perim=0;
  if(smanuVal>0){
    murs=smanuVal;
    if(nm===1){perim=m1;}
    else if(m1>0&&m2>0){if(nm===4)perim=2*(m1+m2);else if(nm===3)perim=2*m1+m2;else perim=m1+m2;}
  } else if(nm===1){
    murs=m1*h;perim=m1;
  } else if(m1>0&&m2>0){
    if(nm===4){murs=2*(m1+m2)*h;perim=2*(m1+m2);}
    else if(nm===3){murs=(2*m1+m2)*h;perim=2*m1+m2;}
    else{murs=(m1+m2)*h;perim=m1+m2;}
  }
  const plaf=plafIn>0?plafIn:(m1>0&&m2>0?m1*m2:0);
  return{murs:+murs.toFixed(2),plaf:+plaf.toFixed(2),ml:+(hasPl?perim:0).toFixed(2)};
}

function upd(id){
  const smanuVal=parseFloat(document.getElementById(`smanu-${id}`)?.value)||0;
  const hint=document.getElementById(`smanu-hint-${id}`);
  if(hint)hint.style.display=smanuVal>0?'block':'none';
  const s=getSurf(id),prev=document.getElementById(`prev-${id}`);
  if(prev){let t='';if(s.murs>0)t+=`Murs: ${s.murs.toFixed(1)}m²`;if(s.plaf>0)t+=(t?' · ':'')+`Sol/Plaf: ${s.plaf.toFixed(1)}m²`;prev.textContent=t;}
  const mlp=document.getElementById(`ml-prev-${id}`);if(mlp)mlp.textContent=s.ml>0?`→ ${s.ml.toFixed(1)} ML`:'';
  const info=document.getElementById(`header-info-${id}`);if(info){let t='';if(s.murs>0)t+=`M: ${s.murs.toFixed(1)}m²`;if(s.plaf>0)t+=(t?' · ':'')+`P: ${s.plaf.toFixed(1)}m²`;info.textContent=t;}// subtotal added by calcAuto
}

function getQte(pr,pid){const s=getSurf(pid);if(pr.zone==='murs')return s.murs;if(pr.zone==='plaf')return s.plaf;if(pr.zone==='ml')return s.ml;if(pr.zone==='choice'){const z=document.getElementById(`zone-${pr.id}-${pid}`)?.value||(pr.def||'murs');if(z==='murs')return s.murs;if(z==='plaf')return s.plaf;if(z==='both')return+(s.murs+s.plaf).toFixed(2);}return 0;}
function getZL(pr,pid){if(pr.zone==='murs')return'murs';if(pr.zone==='plaf')return'sol/plafond';if(pr.zone==='ml')return'';if(pr.zone==='choice'){const z=document.getElementById(`zone-${pr.id}-${pid}`)?.value||(pr.def||'murs');if(z==='murs')return'murs';if(z==='plaf')return'plafond';if(z==='both')return'murs + plafond';}return'';}
function v(id){const e=document.getElementById(id);return e?parseFloat(e.value)||0:0;}
function chk(id){const e=document.getElementById(id);return e?e.checked:false;}

function addFen(pid){const id=++fCnt;fens.push({id,pid});renderFensPiece(pid);autoSave();}
function removeFen(id,pid){snap();fens=fens.filter(f=>f.id!==id);renderFensPiece(pid);autoSave();}
function renderFensPiece(pid){const c=document.getElementById(`fl-${pid}`);if(!c)return;c.innerHTML='';fens.filter(f=>f.pid===pid).forEach(f=>{c.innerHTML+=`<div class="men-row"><div><label>Type</label><select id="ftyp-${f.id}" onchange="snap();autoSave()"><option value="simple">Fenêtre simple</option><option value="double">Fenêtre double</option><option value="pf_simple">Porte-fenêtre simple</option><option value="pf_double">Porte-fenêtre double</option></select></div><div><label>Qté</label><input type="number" id="fqte-${f.id}" min="1" value="1" step="1" onfocus="snap()" oninput="autoSave()"></div><div><label>Faces</label><select id="fface-${f.id}" onchange="snap();autoSave()"><option value="2">2 faces</option><option value="1">1 face</option></select></div><button class="rbtn" onclick="removeFen(${f.id},${pid})">✕</button></div>`;});}

function buildVoletDiv(id){const d=document.createElement('div');d.id=`vrow-${id}`;d.innerHTML=`<div class="volet-row"><div><label>Larg. (m)</label><input type="number" id="vl-${id}" min="0" step="0.01" onfocus="snap()" oninput="updVolet(${id});autoSave()"></div><div><label>Haut. (m)</label><input type="number" id="vh-${id}" min="0" step="0.01" onfocus="snap()" oninput="updVolet(${id});autoSave()"></div><div><label>m² 2f</label><input type="text" id="vs-${id}" readonly style="background:#f0f0f0;color:#888;text-align:center" value="—"></div><div><label>Qté</label><input type="number" id="vq-${id}" min="1" value="1" step="1" onfocus="snap()" oninput="updVolet(${id});autoSave()"></div><button class="rbtn" onclick="removeVolet(${id})">✕</button></div><div class="volet-prix euro" id="vp-${id}"></div>`;return d;}
function addVolet(){const id=++vCnt;volets.push({id});document.getElementById('vl').appendChild(buildVoletDiv(id));autoSave();}
function removeVolet(id){snap();volets=volets.filter(v=>v.id!==id);document.getElementById(`vrow-${id}`)?.remove();autoSave();}
function renderVolets(){const c=document.getElementById('vl');c.innerHTML='';volets.forEach(vo=>{c.appendChild(buildVoletDiv(vo.id));});}
function updVolet(id){const l=parseFloat(document.getElementById(`vl-${id}`)?.value)||0,h=parseFloat(document.getElementById(`vh-${id}`)?.value)||0,q=parseFloat(document.getElementById(`vq-${id}`)?.value)||1;const s=+(l*h*2).toFixed(2);const st=+(s*q).toFixed(2);const mt=+(st*90).toFixed(2);const el=document.getElementById(`vs-${id}`);if(el)el.value=s>0?`${s} m²`:'—';const mp=document.getElementById(`vp-${id}`);if(mp)mp.textContent=mt>0?`→ ${mt.toFixed(2)} € HT`:'';}

function buildRows(){let rows=[],total=0;
  pieces.forEach(p=>{const nom=document.getElementById(`pnom-${p.id}`)?.value||`Pièce ${p.id}`,s=getSurf(p.id),m1v=document.getElementById(`m1-${p.id}`)?.value||'',m2v=document.getElementById(`m2-${p.id}`)?.value||'',hhv=document.getElementById(`hh-${p.id}`)?.value||'',smanuV=document.getElementById(`smanu-${p.id}`)?.value||'';
    rows.push({type:'section',label:nom.toUpperCase(),cotes:{m1:m1v,m2:m2v,hh:hhv,murs:s.murs,plaf:s.plaf,ml:s.ml,smanu:smanuV}});let hasRows=false;
    PREST.forEach(pr=>{if(!chk(`ck-${pr.id}-${p.id}`))return;const qte=getQte(pr,p.id);if(qte<=0)return;const montant=+(qte*pr.pu).toFixed(2);const zl=getZL(pr,p.id);rows.push({label:zl?`${pr.label} — ${zl}`:pr.label,qte,unite:pr.u,pu:pr.pu,montant});total+=montant;hasRows=true;});
    const pP=portes.filter(po=>po.pid===p.id&&v(`pqte-${po.id}`)>0);
    pP.forEach(po=>{const typ=document.getElementById(`ptyp-${po.id}`)?.value||'classique',faces=parseInt(document.getElementById(`pface-${po.id}`)?.value)||2,qte=v(`pqte-${po.id}`),info=PRIX_P[typ],pu=faces===1?info.p1:info.p2,m=+(qte*pu).toFixed(2);rows.push({label:`${info.label} ${faces}f`,qte,unite:'u',pu,montant:m});total+=m;hasRows=true;});
    const fP=fens.filter(f=>f.pid===p.id&&v(`fqte-${f.id}`)>0);
    fP.forEach(f=>{const typ=document.getElementById(`ftyp-${f.id}`)?.value||'simple',faces=parseInt(document.getElementById(`fface-${f.id}`)?.value)||2,qte=v(`fqte-${f.id}`),info=PRIX_F[typ],pu=faces===1?info.p1:info.p2,m=+(qte*pu).toFixed(2);rows.push({label:`${info.label} ${faces}f`,qte,unite:'u',pu,montant:m});total+=m;hasRows=true;});
    const npv=document.querySelector(`#note-portes-${p.id} textarea`)?.value||'';const nfv=document.querySelector(`#note-fenetres-${p.id} textarea`)?.value||'';
    if(npv.trim()){rows.push({type:'note',label:npv});hasRows=true;}if(nfv.trim()){rows.push({type:'note',label:nfv});hasRows=true;}
    const noteVal=document.querySelector(`#note-p-${p.id} textarea`)?.value||'';if(noteVal.trim()){rows.push({type:'note',label:noteVal});hasRows=true;}
    const cd=canvases[p.id]?canvases[p.id].toDataURL():'';if(cd&&cd.length>100){rows.push({type:'canvas',data:cd});hasRows=true;}
    if(!hasRows)rows.pop();});
  if(chk('f-echaf')){rows.push({type:'section',label:'FORFAITS'});rows.push({label:'Montage/démontage échafaudage',qte:1,unite:'forfait',pu:450,montant:450});total+=450;}
  const vA=volets.filter(vo=>v(`vl-${vo.id}`)>0&&v(`vh-${vo.id}`)>0);
  if(vA.length){rows.push({type:'section',label:'VOLETS BOIS'});vA.forEach(vo=>{const l=v(`vl-${vo.id}`),h=v(`vh-${vo.id}`),q=v(`vq-${vo.id}`)||1,su=+(l*h*2).toFixed(2),st=+(su*q).toFixed(2),mt=+(st*90).toFixed(2);rows.push({label:`Volet bois ${l}×${h}m (×${q})`,qte:st,unite:'m²',pu:90,montant:mt});total+=mt;});const nv=document.querySelector('#note-volets textarea')?.value||'';if(nv.trim())rows.push({type:'note',label:nv});}
  return{rows,total:+total.toFixed(2)};}

function calcAuto(){
  const{rows,total}=buildRows();
  window._lastRows=rows;window._lastTotal=total;
  const amt=document.getElementById('sticky-total-amount');
  if(amt)amt.textContent=total.toFixed(2)+' €';
  const tl=document.getElementById('total-ht-line');
  if(tl)tl.textContent=total.toFixed(2)+' €';
  let html=`<tr><th>Désignation</th><th class="rr">Qté</th><th class="rr">Unité</th><th class="rr euro">PU HT</th><th class="rr euro">Montant HT</th></tr>`;
  rows.forEach(r=>{if(r.type==='section'){let ct='';if(r.cotes?.smanu&&parseFloat(r.cotes.smanu)>0){ct=` <span style="font-weight:400;color:#f0a000">surface manuelle: ${r.cotes.smanu}m²</span>`;}else if(r.cotes?.m1&&r.cotes?.hh){if(r.cotes?.m2)ct=` <span style="font-weight:400;color:#999">${r.cotes.m1}×${r.cotes.m2}×${r.cotes.hh}m</span>`;else ct=` <span style="font-weight:400;color:#999">${r.cotes.m1}×${r.cotes.hh}m</span>`;}html+=`<tr class="sr"><td colspan="5">${r.label}${ct}</td></tr>`;}else if(r.type==='note')html+=`<tr><td colspan="5" style="color:#888;font-style:italic;font-size:11px;padding:4px 6px">${r.label.replace(/\n/g,'<br>')}</td></tr>`;else if(r.type!=='canvas')html+=`<tr><td>${r.label}</td><td class="rr">${r.qte}</td><td class="rr">${r.unite}</td><td class="rr euro">${r.pu.toFixed(2)} €</td><td class="rr euro">${r.montant.toFixed(2)} €</td></tr>`;});
  document.getElementById('rtbl').innerHTML=html;
  // Update piece header subtotals (#8)
  pieces.forEach(p=>{
    const s=getSurf(p.id);let st=0;
    PREST.forEach(pr=>{if(!chk(`ck-${pr.id}-${p.id}`))return;const qte=getQte(pr,p.id);if(qte>0)st+=qte*pr.pu;});
    portes.filter(po=>po.pid===p.id&&v(`pqte-${po.id}`)>0).forEach(po=>{const typ=document.getElementById(`ptyp-${po.id}`)?.value||'classique',faces=parseInt(document.getElementById(`pface-${po.id}`)?.value)||2;st+=v(`pqte-${po.id}`)*(faces===1?PRIX_P[typ].p1:PRIX_P[typ].p2);});
    fens.filter(f=>f.pid===p.id&&v(`fqte-${f.id}`)>0).forEach(f=>{const typ=document.getElementById(`ftyp-${f.id}`)?.value||'simple',faces=parseInt(document.getElementById(`fface-${f.id}`)?.value)||2;st+=v(`fqte-${f.id}`)*(faces===1?PRIX_F[typ].p1:PRIX_F[typ].p2);});
    const info=document.getElementById(`header-info-${p.id}`);
    if(info){let t='';if(s.murs>0)t+=`M: ${s.murs.toFixed(1)}m²`;if(s.plaf>0)t+=(t?' · ':'')+`P: ${s.plaf.toFixed(1)}m²`;if(st>0)t+=(t?' · ':'')+`${st.toFixed(0)} €`;info.textContent=t;}
  });
}

function exportPDF(){
  const{rows,total}=buildRows();
  const name=document.getElementById('devis-name-display').textContent,date=document.getElementById('devis-date-display').textContent,sp=!pricesHidden;
  function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  let body=`<div style="display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:16px;margin-bottom:20px;border-bottom:2px solid #1a1a1a"><div><h1 style="font-size:22px;font-weight:700;margin-bottom:4px">Devis</h1><div style="font-size:18px;color:#333;margin-bottom:2px">${esc(name)}</div><div style="font-size:12px;color:#999">${esc(date)}</div></div><div style="text-align:right;font-size:12px;color:#555;line-height:1.8"><strong style="font-size:14px;color:#1a1a1a">SAS Couleurs du Sud</strong><br>Peinture intérieure &amp; extérieure<br>Cavaillon 84300</div></div>`;
  let tr='',inT=false;
  rows.forEach(r=>{
    if(r.type==='section'){if(inT){body+=`<table><thead><tr><th>Désignation</th><th>Qté</th><th>Unité</th>${sp?'<th>PU HT</th><th>Montant HT</th>':''}</tr></thead><tbody>${tr}</tbody></table>`;tr='';inT=false;}let ct='';if(r.cotes?.m1&&r.cotes?.hh){const c=r.cotes;if(c.smanu&&parseFloat(c.smanu)>0){ct=`<br><span style="font-size:11px;color:#f0a000;font-weight:400">Surface manuelle: ${c.smanu}m²</span>`;}else{ct=`<br><span style="font-size:11px;color:#888;font-weight:400">${c.m2?`Mur 1: ${c.m1}m · Mur 2: ${c.m2}m · H: ${c.hh}m`:`Mur 1: ${c.m1}m · H: ${c.hh}m`}`;if(c.murs>0)ct+=` · Murs: ${c.murs}m²`;if(c.plaf>0)ct+=` · Sol/Plaf: ${c.plaf}m²`;if(c.ml>0)ct+=` · Plinthes: ${c.ml}ML`;ct+='</span>';}}body+=`<div class="sh">${esc(r.label)}${ct}</div>`;inT=true;}
    else if(r.type==='note'){if(inT){body+=`<table><thead><tr><th>Désignation</th><th>Qté</th><th>Unité</th>${sp?'<th>PU HT</th><th>Montant HT</th>':''}</tr></thead><tbody>${tr}</tbody></table>`;tr='';inT=false;}body+=`<div class="nb">${esc(r.label).replace(/\n/g,'<br>')}</div>`;}
    else if(r.type==='canvas'){if(inT){body+=`<table><thead><tr><th>Désignation</th><th>Qté</th><th>Unité</th>${sp?'<th>PU HT</th><th>Montant HT</th>':''}</tr></thead><tbody>${tr}</tbody></table>`;tr='';inT=false;}body+=`<div class="cb"><img src="${r.data}" style="max-width:100%"></div>`;}
    else{if(!inT)inT=true;tr+=`<tr><td>${esc(r.label)}</td><td>${r.qte}</td><td>${r.unite}</td>${sp?`<td>${r.pu.toFixed(2)} €</td><td>${r.montant.toFixed(2)} €</td>`:''}</tr>`;}});
  if(inT&&tr)body+=`<table><thead><tr><th>Désignation</th><th>Qté</th><th>Unité</th>${sp?'<th>PU HT</th><th>Montant HT</th>':''}</tr></thead><tbody>${tr}</tbody></table>`;
  if(sp)body+=`<div class="tb"><div class="tl big"><span>Total HT</span><span>${total.toFixed(2)} €</span></div></div>`;
  document.getElementById('pdf-overlay')?.remove();
  const ov=document.createElement('div');
  ov.id='pdf-overlay';
  ov.style.cssText='position:fixed;inset:0;background:#fff;z-index:9999;overflow-y:auto;-webkit-overflow-scrolling:touch';
  ov.innerHTML=`<style>.sh{background:#f5f4f0;padding:6px 10px;font-weight:700;font-size:12px;color:#444;margin-top:16px;border-radius:6px 6px 0 0}table{width:100%;border-collapse:collapse;margin-bottom:8px}th{text-align:left;font-size:10px;color:#999;font-weight:700;padding:5px 8px;border-bottom:1px solid #ddd;background:#fafaf8}td{padding:5px 8px;border-bottom:1px solid #f0f0f0;font-size:12px}td:not(:first-child){text-align:right}.nb{background:#fffbf0;border-left:3px solid #f0c040;padding:8px 12px;margin:6px 0;font-style:italic;color:#666;font-size:12px;border-radius:0 6px 6px 0}.cb{margin:8px 0;border:1px solid #eee;border-radius:6px;padding:8px;background:#fafaf8}.tb{margin-top:20px;background:#1a1a1a;color:#fff;padding:14px 16px;border-radius:8px}.tl{display:flex;justify-content:space-between}.tl.big{font-size:18px;font-weight:700}@media print{@page{margin:15mm}}</style>
  <div class="no-print" style="position:sticky;top:0;background:#1a1a1a;padding:10px 16px;display:flex;gap:8px;z-index:1">
    <button onclick="document.getElementById('pdf-overlay').remove()" style="background:#333;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer">← Retour</button>
    <button onclick="window.print()" style="background:#27ae60;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer;flex:1">📥 Enregistrer / Partager</button>
  </div>
  <div style="padding:20px;max-width:800px;margin:0 auto;font-family:-apple-system,Arial,sans-serif;color:#1a1a1a;font-size:13px">${body}</div>`;
  document.body.appendChild(ov);
}

renderHistory();
</script>
</body>
</html>
