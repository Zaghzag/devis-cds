<title>Devis — Couleurs du Sud</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px;-webkit-text-size-adjust:100%;min-height:100vh}
.screen{display:none;padding:12px;padding-bottom:40px;min-height:100vh}
.screen.active{display:block}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;position:sticky;top:0;background:#f5f4f0;z-index:100;padding:8px 0}
.topbar-title{font-size:16px;font-weight:700;color:#1a1a1a}
.topbar-sub{font-size:11px;color:#999}
.icon-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:7px 10px;font-size:14px;cursor:pointer;color:#444;white-space:nowrap;display:flex;align-items:center;gap:4px}
.icon-btn.dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.save-indicator{font-size:10px;color:#27ae60;text-align:center;height:14px;margin-bottom:4px}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.stitle{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
label{font-size:12px;color:#666;display:block;margin-bottom:3px}
input[type=number],input[type=text],select,textarea{width:100%;font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fafaf8;color:#1a1a1a;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:#999}
textarea{resize:vertical;min-height:60px;font-family:-apple-system,system-ui,sans-serif}
.r4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.ph{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rbtn{background:none;border:none;cursor:pointer;font-size:16px;color:#bbb;padding:4px 8px}
.rbtn:hover{color:#e74c3c}
.addbtn{width:100%;padding:10px;border:1px dashed #ccc;border-radius:8px;background:none;cursor:pointer;font-size:13px;color:#888;margin-bottom:10px}
.addbtn:hover{background:#f0efeb}
.calcbtn{width:100%;padding:14px;background:#1a1a1a;border:none;border-radius:10px;cursor:pointer;font-size:15px;font-weight:700;color:#fff;margin-bottom:10px}
.div{border:none;border-top:1px solid #eee;margin:10px 0}
.sl{font-size:11px;color:#999;margin:8px 0 6px;font-weight:600}
.prev{font-size:11px;color:#27ae60;margin-top:4px;min-height:14px;font-weight:500}
.prow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:6px;margin-bottom:6px;min-height:30px}
.prow-left{display:flex;align-items:center;gap:6px;font-size:13px;color:#1a1a1a}
.prow-left input[type=checkbox]{width:18px;height:18px;margin:0;flex-shrink:0}
.zsel{font-size:11px;padding:4px 6px;border:1px solid #ddd;border-radius:6px;background:#fafaf8;color:#1a1a1a;width:auto}
.surf-tag{font-size:10px;color:#aaa;background:#f0f0f0;padding:2px 6px;border-radius:4px;white-space:nowrap}
.ck-label{display:flex;align-items:center;gap:6px;font-size:13px;color:#1a1a1a;cursor:pointer;margin:0}
.ck-label input{width:18px;height:18px;margin:0}
.men-row{display:grid;grid-template-columns:1fr 60px 80px 28px;gap:6px;align-items:end;margin-bottom:6px}
.volet-row{display:grid;grid-template-columns:1fr 1fr 80px 60px 28px;gap:6px;align-items:end;margin-bottom:6px}
.mb{border:1px solid #eee;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.mt{font-size:12px;font-weight:700;color:#333;margin-bottom:6px}
.note-toggle{font-size:11px;color:#888;cursor:pointer;border:none;background:none;padding:5px 0;text-align:left;margin-top:4px;display:inline-block}
.note-zone{margin-top:6px}
.hidden{display:none}
.canvas-wrap{position:relative;margin-top:6px;border:1px solid #ddd;border-radius:8px;overflow:hidden;background:#fff;touch-action:none}
.canvas-wrap canvas{display:block;touch-action:none}
.canvas-toolbar{display:flex;gap:6px;padding:6px 8px;background:#fafaf8;border-bottom:1px solid #eee;align-items:center}
.canvas-toolbar button{background:none;border:1px solid #ddd;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;color:#444}
.canvas-toolbar button.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.canvas-toolbar input[type=color]{width:28px;height:28px;border:1px solid #ddd;border-radius:6px;padding:2px;cursor:pointer}
.total-block{background:#1a1a1a;color:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.total-block .line{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
.total-block .line.big{font-size:18px;font-weight:700;margin-top:8px;padding-top:8px;border-top:1px solid #444}
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{text-align:left;font-size:10px;font-weight:700;color:#999;padding:6px;border-bottom:1px solid #eee}
.rt td{padding:6px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;vertical-align:top}
.rt .sr td{font-weight:700;background:#f5f4f0;font-size:11px;color:#666;padding:4px 6px}
.rr{text-align:right}
.euro{transition:opacity 0.15s}
.hide-prices .euro{opacity:0;pointer-events:none}
.hist-item{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.hist-info{flex:1;min-width:0}
.hist-name{font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-date{font-size:11px;color:#999;margin-top:2px}
.hist-total{font-size:13px;font-weight:700;color:#1a1a1a}
.hist-actions{display:flex;gap:6px;flex-shrink:0}
.hist-btn{border:1px solid #ddd;background:none;border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer;color:#444}
.hist-btn.red{color:#e74c3c;border-color:#e74c3c}
.empty-state{text-align:center;color:#bbb;font-size:13px;padding:40px 0}
.bottom-actions{display:flex;gap:8px;margin-top:8px;margin-bottom:20px}
.bottom-actions button{flex:1;padding:12px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;background:none;border:1px solid #ccc;color:#666}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:12px}
.modal input{width:100%;font-size:15px;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-confirm{background:#1a1a1a;color:#fff;border:none}
.btn-cancel{background:none;border:1px solid #ccc;color:#666}
</style>
</head>
<body>

<!-- HISTORIQUE -->
<div class="screen active" id="screen-history">
  <div class="topbar">
    <div><div class="topbar-title">📋 Devis</div><div class="topbar-sub">Couleurs du Sud</div></div>
    <button class="icon-btn dark" onclick="newDevis()">+ Nouveau</button>
  </div>
  <div id="hist-list"></div>
</div>

<!-- CALCULATEUR -->
<div class="screen" id="screen-calc">
  <div class="topbar">
    <button class="icon-btn" onclick="showHistory()">← Retour</button>
    <div style="flex:1;text-align:center">
      <div id="devis-name-display" style="font-size:14px;font-weight:700;color:#1a1a1a;cursor:pointer" onclick="renameDevis()">—</div>
      <div id="devis-date-display" style="font-size:10px;color:#999"></div>
    </div>
    <button class="icon-btn" onclick="undo()" id="undoBtn" style="opacity:0.3;pointer-events:none">↩</button>
    <button class="icon-btn" onclick="togglePrices()">👁 <span id="eyeText">Masquer</span></button>
  </div>
  <div class="save-indicator" id="save-indicator"></div>

  <div class="stitle" style="margin-bottom:8px">Pièces</div>
  <div id="pc"></div>
  <button class="addbtn" onclick="addP()">+ Ajouter une pièce</button>

  <div class="card">
    <div class="stitle" style="margin-bottom:8px">Forfaits généraux</div>
    <label class="ck-label"><input type="checkbox" id="f-echaf" onchange="autoSaveWithUndo()"> Montage/démontage échafaudage (<span class="euro">450 €</span>)</label>
  </div>

  <div class="card">
    <div class="stitle" style="margin-bottom:10px">Menuiseries</div>
    <div class="mb">
      <div class="mt">Portes et cadres</div>
      <div id="pl"></div>

      <button class="note-toggle" onclick="toggleZone('note-fenetres')">✏️ Notes</button>

<div class="modal-overlay hidden" id="rename-modal">
  <div class="modal">

<script>
let pricesHidden=false;
let currentDevisId=null;
let pieces=[],pCnt=0,portes=[],ptCnt=0,fens=[],fCnt=0,volets=[],vCnt=0;
let saveTimer=null;
let canvases={};
let undoStack=[];
const MAX_UNDO=30;

function pushUndo(){
  const state=captureState();
  undoStack.push(JSON.stringify(state));
  if(undoStack.length>MAX_UNDO)undoStack.shift();
  const btn=document.getElementById('undoBtn');
  if(btn){btn.style.opacity='1';btn.style.pointerEvents='auto';}
}

function undo(){
  if(undoStack.length<1)return;
  const prev=undoStack.pop();
  if(!prev)return;
  const state=JSON.parse(prev);
  // Reset tout
  pieces=[];pCnt=0;portes=[];ptCnt=0;fens=[];fCnt=0;volets=[];vCnt=0;canvases={};
  document.getElementById('f-echaf').checked=false;
  document.getElementById('pc').innerHTML='';
  document.getElementById('pl').innerHTML='';
  document.getElementById('fl').innerHTML='';
  document.getElementById('vl').innerHTML='';
  document.querySelector('#note-portes textarea').value='';
  document.querySelector('#note-fenetres textarea').value='';
  document.querySelector('#note-volets textarea').value='';
  restoreState(state);
  // Sauvegarder le nouvel état
  if(!currentDevisId)return;
  const h=loadHistory();const idx=h.findIndex(d=>d.id===currentDevisId);
  if(idx>-1){h[idx].data=state;saveHistory(h);}
  const ind=document.getElementById('save-indicator');
  if(ind){ind.textContent='↩ Annulé';setTimeout(()=>{ind.textContent='';},2000);}
  if(undoStack.length===0){const btn=document.getElementById('undoBtn');if(btn){btn.style.opacity='0.3';btn.style.pointerEvents='none';}}
}

const PREST=[
  {id:'detap',    label:'Détapissage',                      pu:5,    u:'m²', zone:'murs'},
  {id:'impres',   label:'Impression glycéro',                pu:6,    u:'m²', zone:'choice', def:'murs'},
  {id:'enduit',   label:'Enduit de rebouchage',              pu:15,   u:'m²', zone:'choice', def:'murs'},
  {id:'peint',    label:'Mise en peinture',                  pu:16.5, u:'m²', zone:'choice', def:'both'},
  {id:'papier',   label:'Pose papier peint (colle fournie)', pu:55,   u:'m²', zone:'murs'},
  {id:'chaux',    label:'Chaux brossée Ressource',           pu:47,   u:'m²', zone:'murs'},
  {id:'sol',      label:'Pose de sol (fourniture client)',   pu:25,   u:'m²', zone:'plaf'},
  {id:'dep_pl',   label:'Dépose et évacuation plinthes',     pu:6,    u:'ML', zone:'ml'},
  {id:'four_pl',  label:'Fourniture plinthe bois',           pu:18,   u:'ML', zone:'ml'},
  {id:'peint_pl2',label:'Peinture plinthe bois',             pu:8,    u:'ML', zone:'ml'},
];
const PRIX_P={
  'classique':{label:'Porte classique',p1:70,p2:140},
  'entree':{label:"Porte d'entrée",p1:150,p2:280},
  'petit_s':{label:'Petit carreau simple',p1:110,p2:220},
  'petit_d':{label:'Petit carreau double',p1:175,p2:350},
  'placard_s':{label:'Placard simple',p1:70,p2:140},
  'placard_d':{label:'Placard double',p1:125,p2:250},
};
const PRIX_F={
  'simple':{label:'Fenêtre simple',p1:70,p2:120},
  'double':{label:'Fenêtre double',p1:140,p2:250},
  'pf_simple':{label:'Porte-fenêtre simple',p1:120,p2:220},
  'pf_double':{label:'Porte-fenêtre double',p1:240,p2:450},
};

/* ===== STORAGE ===== */
function loadHistory(){try{return JSON.parse(localStorage.getItem('cds_v2')||'[]');}catch(e){return[];}}
function saveHistory(h){localStorage.setItem('cds_v2',JSON.stringify(h));}
function todayStr(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}

/* ===== AUTOSAVE ===== */
function autoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    saveCurrentDevis();
    const ind=document.getElementById('save-indicator');
    if(ind){ind.textContent='✓ Sauvegardé';setTimeout(()=>{ind.textContent='';},2000);}
  },500);
}

function autoSaveWithUndo(){
  pushUndo();
  autoSave();
}

/* ===== HISTORIQUE ===== */
function showHistory(){
  saveCurrentDevis();
  document.getElementById('screen-calc').classList.remove('active');
  document.getElementById('screen-history').classList.add('active');
  renderHistory();
}

function renderHistory(){
  const h=loadHistory();
  const c=document.getElementById('hist-list');
  if(!h.length){c.innerHTML=`<div class="empty-state">Aucun devis<br>Appuyez sur "+ Nouveau"</div>`;return;}
  c.innerHTML=h.map(d=>`
    <div class="hist-item">
      <div class="hist-info">
        <div class="hist-name">${d.name}</div>
        <div class="hist-date">${d.date}</div>
      </div>
      <div class="hist-total euro">${d.total?d.total.toFixed(2)+' € HT':'—'}</div>
      <div class="hist-actions">
        <button class="hist-btn" onclick="openDevis('${d.id}')">Ouvrir</button>
        <button class="hist-btn red" onclick="deleteDevis('${d.id}')">✕</button>
      </div>
    </div>`).join('');
}

function newDevis(){
  const id='d_'+Date.now();
  const h=loadHistory();
  h.unshift({id,name:'Nouveau devis',date:todayStr(),total:null,data:null});
  if(h.length>20)h.splice(20);
  saveHistory(h);
  loadDevis(id);
}

function openDevis(id){loadDevis(id);}

function deleteDevis(id){
  if(!confirm('Supprimer ce devis ?'))return;
  let h=loadHistory();h=h.filter(d=>d.id!==id);saveHistory(h);renderHistory();
}

/* ===== CHARGER DEVIS ===== */
function loadDevis(id){
  currentDevisId=id;
  const h=loadHistory();
  const entry=h.find(d=>d.id===id)||{name:'Nouveau devis',date:todayStr(),data:null};
  // Reset
  pieces=[];pCnt=0;portes=[];ptCnt=0;fens=[];fCnt=0;volets=[];vCnt=0;canvases={};
  document.getElementById('f-echaf').checked=false;
  document.getElementById('rz').classList.add('hidden');
  document.querySelector('#note-portes textarea').value='';
  document.querySelector('#note-fenetres textarea').value='';
  document.querySelector('#note-volets textarea').value='';
  document.getElementById('note-portes').classList.add('hidden');
  document.getElementById('note-fenetres').classList.add('hidden');
  document.getElementById('note-volets').classList.add('hidden');
  document.getElementById('pc').innerHTML='';
  document.getElementById('pl').innerHTML='';
  document.getElementById('fl').innerHTML='';
  document.getElementById('vl').innerHTML='';

  if(entry.data){restoreState(entry.data);}else{addP();}

  document.getElementById('devis-name-display').textContent=entry.name;
  document.getElementById('devis-date-display').textContent=entry.date;
  document.getElementById('screen-history').classList.remove('active');
  document.getElementById('screen-calc').classList.add('active');
}

/* ===== SAUVEGARDER ===== */
function saveCurrentDevis(){
  if(!currentDevisId)return;
  const h=loadHistory();
  const idx=h.findIndex(d=>d.id===currentDevisId);
  if(idx===-1)return;
  h[idx].data=captureState();
  if(window._lastTotal!==undefined)h[idx].total=window._lastTotal;
  saveHistory(h);
}

/* ===== CAPTURER L'ÉTAT ===== */
function captureState(){
  const state={
    pieces:[],echaf:document.getElementById('f-echaf')?.checked||false,
    portes:[],fens:[],volets:[],
    note_portes:document.querySelector('#note-portes textarea')?.value||'',
    note_fenetres:document.querySelector('#note-fenetres textarea')?.value||'',
    note_volets:document.querySelector('#note-volets textarea')?.value||'',
    note_portes_open:!document.getElementById('note-portes')?.classList.contains('hidden'),
    note_fenetres_open:!document.getElementById('note-fenetres')?.classList.contains('hidden'),
    note_volets_open:!document.getElementById('note-volets')?.classList.contains('hidden'),
  };
  pieces.forEach(p=>{
    const pi={
      id:p.id,
      nom:document.getElementById(`pnom-${p.id}`)?.value||'',
      m1:document.getElementById(`m1-${p.id}`)?.value||'',
      m2:document.getElementById(`m2-${p.id}`)?.value||'',
      hh:document.getElementById(`hh-${p.id}`)?.value||'',
      nm:document.getElementById(`nm-${p.id}`)?.value||'4',
      plaf:document.getElementById(`plaf-${p.id}`)?.value||'',
      haspl:document.getElementById(`has-pl-${p.id}`)?.checked||false,
      note:document.querySelector(`#note-p-${p.id} textarea`)?.value||'',
      note_open:!document.getElementById(`note-p-${p.id}`)?.classList.contains('hidden'),
      canvas_open:!document.getElementById(`canvas-wrap-${p.id}`)?.classList.contains('hidden'),
      canvas_data:canvases[p.id]?canvases[p.id].toDataURL():'',
      prests:{}
    };
    PREST.forEach(pr=>{
      pi.prests[pr.id]={
        ck:document.getElementById(`ck-${pr.id}-${p.id}`)?.checked||false,
        zone:document.getElementById(`zone-${pr.id}-${p.id}`)?.value||(pr.def||'murs')
      };
    });
    state.pieces.push(pi);
  });
  portes.forEach(p=>{state.portes.push({id:p.id,typ:document.getElementById(`ptyp-${p.id}`)?.value||'classique',qte:document.getElementById(`pqte-${p.id}`)?.value||'1',face:document.getElementById(`pface-${p.id}`)?.value||'2'});});
  fens.forEach(f=>{state.fens.push({id:f.id,typ:document.getElementById(`ftyp-${f.id}`)?.value||'simple',qte:document.getElementById(`fqte-${f.id}`)?.value||'1',face:document.getElementById(`fface-${f.id}`)?.value||'2'});});
  volets.forEach(vo=>{state.volets.push({id:vo.id,l:document.getElementById(`vl-${vo.id}`)?.value||'',h:document.getElementById(`vh-${vo.id}`)?.value||'',q:document.getElementById(`vq-${vo.id}`)?.value||'1'});});
  return state;
}

/* ===== RESTAURER L'ÉTAT ===== */
function restoreState(s){
  document.getElementById('f-echaf').checked=s.echaf||false;
  s.pieces.forEach(pi=>{const id=pi.id;pCnt=Math.max(pCnt,id);pieces.push({id});});
  renderP();
  s.pieces.forEach(pi=>{
    const id=pi.id;
    const setVal=(eid,val)=>{const e=document.getElementById(eid);if(e)e.value=val||'';};
    setVal(`pnom-${id}`,pi.nom);setVal(`m1-${id}`,pi.m1);setVal(`m2-${id}`,pi.m2);
    setVal(`hh-${id}`,pi.hh);setVal(`nm-${id}`,pi.nm||'4');setVal(`plaf-${id}`,pi.plaf);
    const hasPl=document.getElementById(`has-pl-${id}`);if(hasPl)hasPl.checked=pi.haspl||false;
    const noteTA=document.querySelector(`#note-p-${id} textarea`);if(noteTA)noteTA.value=pi.note||'';
    if(pi.note_open)document.getElementById(`note-p-${id}`)?.classList.remove('hidden');
    if(pi.canvas_open)document.getElementById(`canvas-wrap-${id}`)?.classList.remove('hidden');
    if(pi.canvas_data&&pi.canvas_data!==''&&canvases[id]){
      const img=new Image();img.onload=()=>{const ctx=canvases[id].getContext('2d');ctx.drawImage(img,0,0);};img.src=pi.canvas_data;
    }
    PREST.forEach(pr=>{
      const ck=document.getElementById(`ck-${pr.id}-${id}`);
      const zo=document.getElementById(`zone-${pr.id}-${id}`);
      if(ck&&pi.prests&&pi.prests[pr.id])ck.checked=pi.prests[pr.id].ck||false;
      if(zo&&pi.prests&&pi.prests[pr.id])zo.value=pi.prests[pr.id].zone||(pr.def||'murs');
    });
    upd(id);
  });
  s.portes.forEach(p=>{const id=p.id;ptCnt=Math.max(ptCnt,id);portes.push({id});});
  renderPortes();
  s.portes.forEach(p=>{
    const setVal=(eid,val)=>{const e=document.getElementById(eid);if(e)e.value=val||'';};
    setVal(`ptyp-${p.id}`,p.typ);setVal(`pqte-${p.id}`,p.qte);setVal(`pface-${p.id}`,p.face);
  });
  s.fens.forEach(f=>{const id=f.id;fCnt=Math.max(fCnt,id);fens.push({id});});
  renderFens();
  s.fens.forEach(f=>{
    const setVal=(eid,val)=>{const e=document.getElementById(eid);if(e)e.value=val||'';};
    setVal(`ftyp-${f.id}`,f.typ);setVal(`fqte-${f.id}`,f.qte);setVal(`fface-${f.id}`,f.face);
  });
  s.volets.forEach(vo=>{const id=vo.id;vCnt=Math.max(vCnt,id);volets.push({id});});
  renderVolets();
  s.volets.forEach(vo=>{
    const setVal=(eid,val)=>{const e=document.getElementById(eid);if(e)e.value=val||'';};
    setVal(`vl-${vo.id}`,vo.l);setVal(`vh-${vo.id}`,vo.h);setVal(`vq-${vo.id}`,vo.q);updVolet(vo.id);
  });
  if(s.note_portes)document.querySelector('#note-portes textarea').value=s.note_portes;
  if(s.note_fenetres)document.querySelector('#note-fenetres textarea').value=s.note_fenetres;
  if(s.note_volets)document.querySelector('#note-volets textarea').value=s.note_volets;
  if(s.note_portes_open)document.getElementById('note-portes').classList.remove('hidden');
  if(s.note_fenetres_open)document.getElementById('note-fenetres').classList.remove('hidden');
  if(s.note_volets_open)document.getElementById('note-volets').classList.remove('hidden');
}

/* ===== RENAME ===== */
function renameDevis(){
  document.getElementById('rename-input').value=document.getElementById('devis-name-display').textContent;
  document.getElementById('rename-modal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('rename-input').focus(),100);
}
function closeModal(){document.getElementById('rename-modal').classList.add('hidden');}
function confirmRename(){
  const val=document.getElementById('rename-input').value.trim();
  if(!val){closeModal();return;}
  document.getElementById('devis-name-display').textContent=val;
  const h=loadHistory();const idx=h.findIndex(d=>d.id===currentDevisId);
  if(idx>-1){h[idx].name=val;saveHistory(h);}
  closeModal();
}
document.getElementById('rename-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmRename();});

/* ===== CANVAS PENCIL ===== */
function initCanvas(id){
  const canvas=document.getElementById(`canvas-${id}`);
  if(!canvas||canvases[id])return;
  canvas.width=canvas.offsetWidth||320;
  canvas.height=200;
  const ctx=canvas.getContext('2d');
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round';
  canvases[id]=canvas;
  let drawing=false,lastX=0,lastY=0,erasing=false;

  function getPos(e){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width;
    const scaleY=canvas.height/rect.height;
    if(e.touches){return{x:(e.touches[0].clientX-rect.left)*scaleX,y:(e.touches[0].clientY-rect.top)*scaleY};}
    return{x:(e.clientX-rect.left)*scaleX,y:(e.clientY-rect.top)*scaleY};
  }

  function startDraw(e){
    e.preventDefault();drawing=true;
    const p=getPos(e);lastX=p.x;lastY=p.y;
    ctx.beginPath();ctx.moveTo(lastX,lastY);
  }
  function draw(e){
    if(!drawing)return;e.preventDefault();
    const p=getPos(e);
    if(erasing){ctx.clearRect(p.x-10,p.y-10,20,20);}
    else{ctx.lineTo(p.x,p.y);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y);}
    lastX=p.x;lastY=p.y;
  }
  function stopDraw(e){if(drawing){drawing=false;autoSave();}}

  canvas.addEventListener('touchstart',startDraw,{passive:false});
  canvas.addEventListener('touchmove',draw,{passive:false});
  canvas.addEventListener('touchend',stopDraw);
  canvas.addEventListener('mousedown',startDraw);
  canvas.addEventListener('mousemove',draw);
  canvas.addEventListener('mouseup',stopDraw);

  // Boutons toolbar
  document.getElementById(`btn-pen-${id}`).addEventListener('click',()=>{erasing=false;ctx.lineWidth=1.5;ctx.strokeStyle='#1a1a1a';document.getElementById(`btn-pen-${id}`).classList.add('active');document.getElementById(`btn-eraser-${id}`).classList.remove('active');});
  document.getElementById(`btn-eraser-${id}`).addEventListener('click',()=>{erasing=true;document.getElementById(`btn-eraser-${id}`).classList.add('active');document.getElementById(`btn-pen-${id}`).classList.remove('active');});
  document.getElementById(`btn-clear-${id}`).addEventListener('click',()=>{ctx.clearRect(0,0,canvas.width,canvas.height);autoSave();});
  document.getElementById(`btn-color-${id}`).addEventListener('input',e=>{ctx.strokeStyle=e.target.value;});
}

/* ===== PIÈCES ===== */
function addP(){
  const id=++pCnt;
  pieces.push({id});
  renderPiece(id);
  autoSave();
}

function removeP(id){
  pushUndo();
  pieces=pieces.filter(p=>p.id!==id);
  const el=document.getElementById(`pc-${id}`);
  if(el)el.remove();
  delete canvases[id];
  autoSave();
}

function renderP(){
  const c=document.getElementById('pc');c.innerHTML='';
  pieces.forEach(p=>renderPiece(p.id));
}

function renderPiece(id){
  const c=document.getElementById('pc');
  const prestHTML=PREST.map(pr=>{
    let right='';
    if(pr.zone==='choice'){
      const defVal=pr.def||'murs';
      right=`<select class="zsel" id="zone-${pr.id}-${id}" onchange="autoSaveWithUndo()"><option value="murs"${defVal==='murs'?' selected':''}>Murs</option><option value="plaf"${defVal==='plaf'?' selected':''}>Plafond</option><option value="both"${defVal==='both'?' selected':''}>Les deux</option></select>`;
    } else if(pr.zone==='murs'){right=`<span class="surf-tag">murs</span>`;}
    else if(pr.zone==='plaf'){right=`<span class="surf-tag">sol/plafond</span>`;}
    else if(pr.zone==='ml'){right=`<span class="surf-tag">ML auto</span>`;}
    return `<div class="prow"><div class="prow-left"><input type="checkbox" id="ck-${pr.id}-${id}" onchange="autoSaveWithUndo()"><span>${pr.label} (<span class="euro">${pr.pu} €/${pr.u}</span>)</span></div>${right}</div>`;
  }).join('');

  const div=document.createElement('div');
  div.className='card';div.id=`pc-${id}`;
  div.innerHTML=`
    <div class="ph">
      <input type="text" placeholder="Nom de la pièce (ex: Salon)" id="pnom-${id}" style="flex:1;font-size:14px;font-weight:700;border:none;background:transparent;padding:0;color:#1a1a1a" oninput="autoSave()" onfocus="pushUndo()">
      <button class="rbtn" onclick="removeP(${id})">✕</button>
    </div>
    <div class="sl">Dimensions</div>
    <div class="r4">
      <div><label>Mur 1 (m)</label><input type="number" id="m1-${id}" min="0" step="0.1" oninput="upd(${id});autoSave()"></div>
      <div><label>Mur 2 (m)</label><input type="number" id="m2-${id}" min="0" step="0.1" oninput="upd(${id});autoSave()"></div>
      <div><label>Hauteur (m)</label><input type="number" id="hh-${id}" min="0" step="0.1" placeholder="2.5" oninput="upd(${id});autoSave()"></div>
      <div><label>Nb murs</label><select id="nm-${id}" onchange="upd(${id});autoSave()"><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
    </div>
    <div class="r2">
      <div><label>Plafond/sol m² (si diff.)</label><input type="number" id="plaf-${id}" min="0" step="0.5" placeholder="auto" oninput="upd(${id});autoSave()"></div>
      <div style="display:flex;align-items:center;gap:8px;padding-top:18px">
        <label class="ck-label"><input type="checkbox" id="has-pl-${id}" onchange="upd(${id});autoSave()"> Plinthes</label>
        <span id="ml-prev-${id}" style="font-size:11px;color:#888"></span>
      </div>
    </div>
    <div class="prev" id="prev-${id}"></div>
    <hr class="div">
    <div class="sl">Prestations</div>
    ${prestHTML}
    <hr class="div">
    <button class="note-toggle" onclick="toggleZone('note-p-${id}')">✏️ Notes clavier</button>
    <div class="note-zone hidden" id="note-p-${id}"><textarea placeholder="Notes pour cette pièce..." oninput="autoSave()" onfocus="pushUndo()"></textarea></div>
    <button class="note-toggle" onclick="toggleZone('canvas-wrap-${id}');initCanvas(${id})">🖊 Croquis Pencil</button>
    <div class="canvas-wrap hidden" id="canvas-wrap-${id}">
      <div class="canvas-toolbar">
        <button id="btn-pen-${id}" class="active">✏️ Stylo</button>
        <button id="btn-eraser-${id}">⬜ Gomme</button>
        <input type="color" id="btn-color-${id}" value="#1a1a1a" title="Couleur">
        <button id="btn-clear-${id}" style="margin-left:auto;color:#e74c3c">🗑 Effacer</button>
      </div>
      <canvas id="canvas-${id}" style="width:100%;height:200px;background:#fff"></canvas>
    </div>`;
  c.appendChild(div);
}

function getSurf(id){
  const m1=parseFloat(document.getElementById(`m1-${id}`)?.value)||0;
  const m2=parseFloat(document.getElementById(`m2-${id}`)?.value)||0;
  const h=parseFloat(document.getElementById(`hh-${id}`)?.value)||2.5;
  const nm=parseInt(document.getElementById(`nm-${id}`)?.value)||4;
  const plafIn=parseFloat(document.getElementById(`plaf-${id}`)?.value)||0;
  const hasPl=document.getElementById(`has-pl-${id}`)?.checked;
  let murs=0,perim=0;
  if(nm===1){murs=m1*h;perim=m1;}
  else if(m1>0&&m2>0){
    if(nm===4){murs=2*(m1+m2)*h;perim=2*(m1+m2);}
    else if(nm===3){murs=(2*m1+m2)*h;perim=2*m1+m2;}
    else{murs=(m1+m2)*h;perim=m1+m2;}
  }
  const plaf=plafIn>0?plafIn:(m1>0&&m2>0?m1*m2:0);
  const ml=hasPl?perim:0;
  return{murs:parseFloat(murs.toFixed(2)),plaf:parseFloat(plaf.toFixed(2)),ml:parseFloat(ml.toFixed(2))};
}

function upd(id){
  const s=getSurf(id);
  const prev=document.getElementById(`prev-${id}`);
  if(prev){let t='';if(s.murs>0)t+=`Murs : ${s.murs.toFixed(1)} m²`;if(s.plaf>0)t+=(t?' · ':'')+`Sol/Plafond : ${s.plaf.toFixed(1)} m²`;prev.textContent=t;}
  const mlp=document.getElementById(`ml-prev-${id}`);
  if(mlp)mlp.textContent=s.ml>0?`→ ${s.ml.toFixed(1)} ML`:'';
}

function getQte(pr,pid){
  const s=getSurf(pid);
  if(pr.zone==='murs')return s.murs;
  if(pr.zone==='plaf')return s.plaf;
  if(pr.zone==='ml')return s.ml;
  if(pr.zone==='choice'){
    const z=document.getElementById(`zone-${pr.id}-${pid}`)?.value||(pr.def||'murs');
    if(z==='murs')return s.murs;if(z==='plaf')return s.plaf;if(z==='both')return parseFloat((s.murs+s.plaf).toFixed(2));
  }
  return 0;
}

function getZL(pr,pid){
  if(pr.zone==='murs')return 'murs';if(pr.zone==='plaf')return 'sol/plafond';if(pr.zone==='ml')return '';
  if(pr.zone==='choice'){const z=document.getElementById(`zone-${pr.id}-${pid}`)?.value||(pr.def||'murs');if(z==='murs')return 'murs';if(z==='plaf')return 'plafond';if(z==='both')return 'murs + plafond';}
  return '';
}

function v(id){const e=document.getElementById(id);return e?parseFloat(e.value)||0:0;}
function chk(id){const e=document.getElementById(id);return e?e.checked:false;}
function toggleZone(id){document.getElementById(id)?.classList.toggle('hidden');}

/* ===== MENUISERIES ===== */
function addPorte(){const id=++ptCnt;portes.push({id});renderPortes();autoSave();}
function removePorte(id){pushUndo();portes=portes.filter(p=>p.id!==id);renderPortes();autoSave();}
function renderPortes(){

  portes.forEach(p=>{c.innerHTML+=`
    <div class="men-row">
      <div><label>Type</label><select id="ptyp-${p.id}" onchange="autoSaveWithUndo()"><option value="classique">Porte classique</option><option value="entree">Porte d'entrée</option><option value="petit_s">Petit carreau simple</option><option value="petit_d">Petit carreau double</option><option value="placard_s">Placard simple</option><option value="placard_d">Placard double</option></select></div>
      <div><label>Qté</label><input type="number" id="pqte-${p.id}" min="1" value="1" step="1" oninput="autoSave()" onfocus="pushUndo()"></div>
      <div><label>Faces</label><select id="pface-${p.id}" onchange="autoSaveWithUndo()"><option value="2">2 faces</option><option value="1">1 face</option></select></div>
      <button class="rbtn" onclick="removePorte(${p.id})">✕</button>

}

function addFen(){const id=++fCnt;fens.push({id});renderFens();autoSave();}
function removeFen(id){pushUndo();fens=fens.filter(f=>f.id!==id);renderFens();autoSave();}
function renderFens(){
  const c=document.getElementById('fl');c.innerHTML='';
  fens.forEach(f=>{c.innerHTML+=`
    <div class="men-row">
      <div><label>Type</label><select id="ftyp-${f.id}" onchange="autoSaveWithUndo()"><option value="simple">Fenêtre simple</option><option value="double">Fenêtre double</option><option value="pf_simple">Porte-fenêtre simple</option><option value="pf_double">Porte-fenêtre double</option></select></div>
      <div><label>Qté</label><input type="number" id="fqte-${f.id}" min="1" value="1" step="1" oninput="autoSave()" onfocus="pushUndo()"></div>
      <div><label>Faces</label><select id="fface-${f.id}" onchange="autoSaveWithUndo()"><option value="2">2 faces</option><option value="1">1 face</option></select></div>

function addVolet(){const id=++vCnt;volets.push({id});renderVolets();autoSave();}
function removeVolet(id){pushUndo();volets=volets.filter(v=>v.id!==id);renderVolets();autoSave();}
function renderVolets(){
  const c=document.getElementById('vl');c.innerHTML='';
  volets.forEach(vo=>{c.innerHTML+=`
    <div class="volet-row">
      <div><label>Larg. (m)</label><input type="number" id="vl-${vo.id}" min="0" step="0.01" oninput="updVolet(${vo.id});autoSave()"></div>
      <div><label>Haut. (m)</label><input type="number" id="vh-${vo.id}" min="0" step="0.01" oninput="updVolet(${vo.id});autoSave()"></div>
      <div><label>m² 2f</label><input type="text" id="vs-${vo.id}" readonly style="background:#f0f0f0;color:#888;text-align:center" value="—"></div>
      <div><label>Qté</label><input type="number" id="vq-${vo.id}" min="1" value="1" step="1" oninput="autoSave()" onfocus="pushUndo()"></div>
      <button class="rbtn" onclick="removeVolet(${vo.id})">✕</button>
    </div>`;});

function updVolet(id){
  const l=parseFloat(document.getElementById(`vl-${id}`)?.value)||0;
  const h=parseFloat(document.getElementById(`vh-${id}`)?.value)||0;
  const surf=parseFloat((l*h*2).toFixed(2));
  const el=document.getElementById(`vs-${id}`);if(el)el.value=surf>0?`${surf} m²`:'—';
}

/* ===== CALCUL ===== */
function buildRows(){
  let rows=[],total=0;
  pieces.forEach(p=>{
    const nom=document.getElementById(`pnom-${p.id}`)?.value||`Pièce ${p.id}`;
    const s=getSurf(p.id);
    const m1=document.getElementById(`m1-${p.id}`)?.value||'';
    const m2=document.getElementById(`m2-${p.id}`)?.value||'';
    const hh=document.getElementById(`hh-${p.id}`)?.value||'';
    rows.push({type:'section',label:nom.toUpperCase(),cotes:{m1,m2,hh,murs:s.murs,plaf:s.plaf,ml:s.ml}});
    let hasRows=false;
    PREST.forEach(pr=>{
      if(!chk(`ck-${pr.id}-${p.id}`))return;
      const qte=getQte(pr,p.id);if(qte<=0)return;
      const montant=parseFloat((qte*pr.pu).toFixed(2));
      const zl=getZL(pr,p.id);
      rows.push({label:zl?`${pr.label} — ${zl}`:pr.label,qte,unite:pr.u,pu:pr.pu,montant});
      total+=montant;hasRows=true;
    });
    const noteVal=document.querySelector(`#note-p-${p.id} textarea`)?.value||'';
    if(noteVal.trim())rows.push({type:'note',label:noteVal});
    const canvasData=canvases[p.id]?canvases[p.id].toDataURL():'';
    if(canvasData&&canvasData!==''&&canvasData.length>100)rows.push({type:'canvas',data:canvasData});
    if(!hasRows&&!noteVal&&!canvasData)rows.pop();
  });
  if(chk('f-echaf')){rows.push({type:'section',label:'FORFAITS'});rows.push({label:'Montage/démontage échafaudage',qte:1,unite:'forfait',pu:450,montant:450});total+=450;}
  const pA=portes.filter(p=>v(`pqte-${p.id}`)>0);
  const fA=fens.filter(f=>v(`fqte-${f.id}`)>0);
  const vA=volets.filter(vo=>v(`vl-${vo.id}`)>0&&v(`vh-${vo.id}`)>0);
  if(pA.length||fA.length||vA.length){
    rows.push({type:'section',label:'MENUISERIES & VOLETS'});
    pA.forEach(p=>{const typ=document.getElementById(`ptyp-${p.id}`)?.value||'classique';const faces=parseInt(document.getElementById(`pface-${p.id}`)?.value)||2;const qte=v(`pqte-${p.id}`);const info=PRIX_P[typ];const pu=faces===1?info.p1:info.p2;const m=parseFloat((qte*pu).toFixed(2));rows.push({label:`${info.label} ${faces}f`,qte,unite:'u',pu,montant:m});total+=m;});
    fA.forEach(f=>{const typ=document.getElementById(`ftyp-${f.id}`)?.value||'simple';const faces=parseInt(document.getElementById(`fface-${f.id}`)?.value)||2;const qte=v(`fqte-${f.id}`);const info=PRIX_F[typ];const pu=faces===1?info.p1:info.p2;const m=parseFloat((qte*pu).toFixed(2));rows.push({label:`${info.label} ${faces}f`,qte,unite:'u',pu,montant:m});total+=m;});
    vA.forEach(vo=>{const l=v(`vl-${vo.id}`),h=v(`vh-${vo.id}`),q=v(`vq-${vo.id}`)||1;const surfUnit=parseFloat((l*h*2).toFixed(2));const surfTotal=parseFloat((surfUnit*q).toFixed(2));const montant=parseFloat((surfTotal*90).toFixed(2));rows.push({label:`Volet bois ${l}×${h}m (×${q})`,qte:surfTotal,unite:'m²',pu:90,montant});total+=montant;});
    ['portes','fenetres','volets'].forEach(k=>{const n=document.querySelector(`#note-${k} textarea`)?.value||'';if(n.trim())rows.push({type:'note',label:n});});
  }
  total=parseFloat(total.toFixed(2));
  return{rows,total};
}

function calc(){
  const{rows,total}=buildRows();
  window._lastRows=rows;window._lastTotal=total;
  document.getElementById('total-block').innerHTML=`<div class="line big"><span>Total HT</span><span class="euro">${total.toFixed(2)} €</span></div>`;
  let html=`<tr><th>Désignation</th><th class="rr">Qté</th><th class="rr">Unité</th><th class="rr euro">PU HT</th><th class="rr euro">Montant HT</th></tr>`;
  rows.forEach(r=>{
    if(r.type==='section'){
      let cotesTxt='';
      if(r.cotes){const c=r.cotes;if(c.m1&&c.m2&&c.hh)cotesTxt=` <span style="font-weight:400;color:#999">${c.m1}m × ${c.m2}m × ${c.hh}m</span>`;}
      html+=`<tr class="sr"><td colspan="5">${r.label}${cotesTxt}</td></tr>`;
    }
    else if(r.type==='note')html+=`<tr><td colspan="5" style="color:#888;font-style:italic;font-size:11px;padding:4px 6px">${r.label.replace(/\n/g,'<br>')}</td></tr>`;
    else if(r.type==='canvas'){}
    else html+=`<tr><td>${r.label}</td><td class="rr">${r.qte}</td><td class="rr">${r.unite}</td><td class="rr euro">${r.pu.toFixed(2)} €</td><td class="rr euro">${r.montant.toFixed(2)} €</td></tr>`;
  });
  document.getElementById('rtbl').innerHTML=html;
  document.getElementById('rz').classList.remove('hidden');
  saveCurrentDevis();
}

function togglePrices(){
  pricesHidden=!pricesHidden;
  document.body.classList.toggle('hide-prices',pricesHidden);

/* ===== COPIER MEG ===== */
function copyR(){
  const rows=window._lastRows||[];const total=window._lastTotal||0;
  let txt=`RÉCAP DEVIS — COULEURS DU SUD\n${document.getElementById('devis-name-display').textContent} — ${document.getElementById('devis-date-display').textContent}\n${'─'.repeat(52)}\n`;
  rows.forEach(r=>{
    if(r.type==='section'){let c='';if(r.cotes&&r.cotes.m1)c=` (${r.cotes.m1}×${r.cotes.m2}×${r.cotes.hh}m)`;txt+=`\n${r.label}${c}\n`;}
    else if(r.type==='note')txt+=`  → ${r.label}\n`;
    else if(r.type==='canvas'){}
    else txt+=`${r.label.padEnd(40)}${String(r.qte).padStart(6)} ${r.unite.padEnd(7)} ${r.pu.toFixed(0).padStart(5)}€  →  ${r.montant.toFixed(2)} €\n`;
  });
  txt+=`\n${'─'.repeat(52)}\nTotal HT : ${total.toFixed(2)} €\n`;
  navigator.clipboard.writeText(txt).then(()=>{alert('Copié !');});
}

/* ===== EXPORT PDF ===== */
function exportPDF(){
  const{rows,total}=buildRows();
  const name=document.getElementById('devis-name-display').textContent;
  const date=document.getElementById('devis-date-display').textContent;
  const showPrices=!pricesHidden;

  let bodyHTML=`<h1>Devis — ${name}</h1><h2>SAS Couleurs du Sud · ${date}</h2>`;
  let tableRows='';let inTable=false;

  rows.forEach(r=>{
    if(r.type==='section'){
      if(inTable){bodyHTML+=`<table><thead><tr><th>Désignation</th><th>Qté</th><th>Unité</th>${showPrices?'<th>PU HT</th><th>Montant HT</th>':''}</tr></thead><tbody>${tableRows}</tbody></table>`;tableRows='';inTable=false;}
      let cotesTxt='';
      if(r.cotes&&r.cotes.m1&&r.cotes.m2&&r.cotes.hh){const c=r.cotes;cotesTxt=`<br><span style="font-size:11px;color:#888;font-weight:400">Mur 1: ${c.m1}m · Mur 2: ${c.m2}m · Hauteur: ${c.hh}m`;if(c.murs>0)cotesTxt+=` · Murs: ${c.murs}m²`;if(c.plaf>0)cotesTxt+=` · Sol/Plafond: ${c.plaf}m²`;cotesTxt+='</span>';}
      bodyHTML+=`<div class="section-header">${r.label}${cotesTxt}</div>`;
      inTable=true;
    } else if(r.type==='note'){
      if(inTable){bodyHTML+=`<table><thead><tr><th>Désignation</th><th>Qté</th><th>Unité</th>${showPrices?'<th>PU HT</th><th>Montant HT</th>':''}</tr></thead><tbody>${tableRows}</tbody></table>`;tableRows='';inTable=false;}
      bodyHTML+=`<div class="note-box">${r.label.replace(/\n/g,'<br>')}</div>`;
      inTable=false;
    } else if(r.type==='canvas'){
      if(inTable){bodyHTML+=`<table><thead><tr><th>Désignation</th><th>Qté</th><th>Unité</th>${showPrices?'<th>PU HT</th><th>Montant HT</th>':''}</tr></thead><tbody>${tableRows}</tbody></table>`;tableRows='';inTable=false;}
      bodyHTML+=`<div class="canvas-box"><img src="${r.data}" style="max-width:100%;border-radius:6px"></div>`;
    } else {
      if(!inTable)inTable=true;
      tableRows+=`<tr><td>${r.label}</td><td>${r.qte}</td><td>${r.unite}</td>${showPrices?`<td>${r.pu.toFixed(2)} €</td><td>${r.montant.toFixed(2)} €</td>`:''}`;
    }
  });
  if(inTable&&tableRows)bodyHTML+=`<table><thead><tr><th>Désignation</th><th>Qté</th><th>Unité</th>${showPrices?'<th>PU HT</th><th>Montant HT</th>':''}</tr></thead><tbody>${tableRows}</tbody></table>`;
  if(showPrices)bodyHTML+=`<div class="total-box"><div class="total-line big"><span>Total HT</span><span>${total.toFixed(2)} €</span></div></div>`;

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Devis ${name}</title>
  <style>
    body{font-family:-apple-system,Arial,sans-serif;color:#1a1a1a;padding:20px;font-size:13px;max-width:800px;margin:0 auto}
    h1{font-size:20px;font-weight:700;margin-bottom:4px}
    h2{font-size:12px;color:#999;font-weight:400;margin-bottom:20px}
    .section-header{background:#f5f4f0;padding:6px 10px;font-weight:700;font-size:12px;color:#444;margin-top:16px;margin-bottom:0;border-radius:6px 6px 0 0}
    table{width:100%;border-collapse:collapse;margin-bottom:8px}
    th{text-align:left;font-size:10px;color:#999;font-weight:700;padding:5px 8px;border-bottom:1px solid #ddd;background:#fafaf8}
    td{padding:5px 8px;border-bottom:1px solid #f0f0f0;font-size:12px}
    td:not(:first-child){text-align:right}
    .note-box{background:#fffbf0;border-left:3px solid #f0c040;padding:8px 12px;margin:6px 0;font-style:italic;color:#666;font-size:12px;border-radius:0 6px 6px 0}
    .canvas-box{margin:8px 0;border:1px solid #eee;border-radius:6px;padding:8px;background:#fafaf8}
    .total-box{margin-top:20px;background:#1a1a1a;color:#fff;padding:14px 16px;border-radius:8px}
    .total-line{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
    .total-line.big{font-size:18px;font-weight:700}
    @media print{body{padding:0}@page{margin:15mm}}
  </style></head><body>${bodyHTML}</body></html>`;

  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`Devis_${name.replace(/\s+/g,'_')}_${date.replace(/\//g,'-')}.html`;
  a.click();URL.revokeObjectURL(url);
}
