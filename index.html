<title>Devis — Couleurs du Sud</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px;-webkit-text-size-adjust:100%;min-height:100vh}
.screen{display:none;padding:12px;min-height:100vh}
.screen.active{display:block}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.topbar-title{font-size:16px;font-weight:700;color:#1a1a1a}
.topbar-sub{font-size:11px;color:#999}
.icon-btn{background:none;border:1px solid #ddd;border-radius:8px;padding:7px 10px;font-size:15px;cursor:pointer;color:#444;white-space:nowrap;display:flex;align-items:center;gap:5px}
.icon-btn span{font-size:11px;font-weight:500}
.icon-btn:hover{background:#eee}
.icon-btn.dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.stitle{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
label{font-size:12px;color:#666;display:block;margin-bottom:3px}
input[type=number],input[type=text],select,textarea{width:100%;font-size:14px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fafaf8;color:#1a1a1a;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:#999}
textarea{resize:vertical;min-height:64px;font-family:-apple-system,system-ui,sans-serif;font-size:14px}
.r4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.ph{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.rbtn{background:none;border:none;cursor:pointer;font-size:16px;color:#bbb;padding:4px 8px}
.rbtn:hover{color:#e74c3c}
.addbtn{width:100%;padding:10px;border:1px dashed #ccc;border-radius:8px;background:none;cursor:pointer;font-size:13px;color:#888;margin-bottom:10px}
.addbtn:hover{background:#f0efeb}
.calcbtn{width:100%;padding:14px;background:#1a1a1a;border:none;border-radius:10px;cursor:pointer;font-size:15px;font-weight:700;color:#fff;margin-bottom:10px}
.div{border:none;border-top:1px solid #eee;margin:10px 0}
.sl{font-size:11px;color:#999;margin:8px 0 6px;font-weight:600}
.prev{font-size:11px;color:#666;margin-top:4px;min-height:14px;font-style:italic}
.prow{display:grid;grid-template-columns:1fr auto;align-items:center;gap:6px;margin-bottom:6px;min-height:30px}
.prow-left{display:flex;align-items:center;gap:6px;font-size:13px;color:#1a1a1a}
.prow-left input[type=checkbox]{width:18px;height:18px;margin:0;flex-shrink:0}
.zsel{font-size:11px;padding:4px 6px;border:1px solid #ddd;border-radius:6px;background:#fafaf8;color:#1a1a1a;width:auto}
.surf-tag{font-size:10px;color:#aaa;background:#f0f0f0;padding:2px 6px;border-radius:4px;white-space:nowrap}
.ck-label{display:flex;align-items:center;gap:6px;font-size:13px;color:#1a1a1a;cursor:pointer;margin:0}
.ck-label input{width:18px;height:18px;margin:0}
.men-row{display:grid;grid-template-columns:1fr 60px 80px 28px;gap:6px;align-items:end;margin-bottom:6px}
.volet-row{display:grid;grid-template-columns:1fr 1fr 80px 60px 28px;gap:6px;align-items:end;margin-bottom:6px}
.mb{border:1px solid #eee;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.mt{font-size:12px;font-weight:700;color:#333;margin-bottom:6px}
.note-toggle{font-size:11px;color:#aaa;cursor:pointer;border:none;background:none;padding:4px 0;text-align:left;margin-top:2px;display:block}
.note-toggle:hover{color:#666}
.note-zone{margin-top:6px}
.hidden{display:none}
.total-block{background:#1a1a1a;color:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.total-block .line{display:flex;justify-content:space-between;font-size:14px;margin-bottom:4px}
.total-block .line.big{font-size:18px;font-weight:700;margin-top:8px;padding-top:8px;border-top:1px solid #444}
.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{text-align:left;font-size:10px;font-weight:700;color:#999;padding:6px;border-bottom:1px solid #eee}
.rt td{padding:6px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;vertical-align:top}
.rt .sr td{font-weight:700;background:#f5f4f0;font-size:11px;color:#666;padding:4px 6px}
.rr{text-align:right}
.euro{transition:opacity 0.15s}
.hide-prices .euro{opacity:0;pointer-events:none}
.hist-item{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.hist-info{flex:1;min-width:0}
.hist-name{font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-date{font-size:11px;color:#999;margin-top:2px}
.hist-ttc{font-size:13px;font-weight:700;color:#1a1a1a}
.hist-actions{display:flex;gap:6px;flex-shrink:0}
.hist-btn{border:1px solid #ddd;background:none;border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer;color:#444}
.hist-btn:hover{background:#f0efeb}
.hist-btn.red{color:#e74c3c;border-color:#e74c3c}
.empty-state{text-align:center;color:#bbb;font-size:13px;padding:40px 0}
.bottom-actions{display:flex;gap:8px;margin-top:8px;margin-bottom:20px}
.bottom-actions button{flex:1;padding:12px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500}
.btn-secondary{background:none;border:1px solid #ccc;color:#666}
.btn-secondary:hover{background:#f0efeb}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:12px}
.modal input{width:100%;font-size:15px;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-confirm{background:#1a1a1a;color:#fff;border:none}
.btn-cancel{background:none;border:1px solid #ccc;color:#666}
</style>
</head>
<body>

<div class="screen active" id="screen-history">
  <div class="topbar">
    <div>
      <div class="topbar-title">📋 Devis</div>
      <div class="topbar-sub">Couleurs du Sud</div>
    </div>
    <button class="icon-btn dark" onclick="newDevis()">+ Nouveau</button>
  </div>
  <div id="hist-list"></div>
</div>

<div class="screen" id="screen-calc">
  <div class="topbar">
    <button class="icon-btn" onclick="showHistory()">← Retour</button>
    <div style="flex:1;text-align:center">
      <div id="devis-name-display" style="font-size:14px;font-weight:700;color:#1a1a1a;cursor:pointer" onclick="renameDevis()">—</div>
      <div id="devis-date-display" style="font-size:11px;color:#999"></div>
    </div>
    <button class="icon-btn" id="eyeBtn" onclick="togglePrices()">👁 <span id="eyeText">Masquer</span></button>
  </div>
  <div class="stitle" style="margin-bottom:8px">Pièces</div>
  <div id="pc"></div>
  <button class="addbtn" onclick="addP()">+ Ajouter une pièce</button>
  <div class="card">
    <div class="stitle" style="margin-bottom:8px">Forfaits généraux</div>
    <label class="ck-label"><input type="checkbox" id="f-echaf"> Montage/démontage échafaudage (<span class="euro">450 €</span>)</label>
  </div>
  <div class="card">
    <div class="stitle" style="margin-bottom:10px">Menuiseries</div>
    <div class="mb">
      <div class="mt">Portes et cadres</div>
      <div id="pl"></div>
      <button class="addbtn" style="margin-bottom:0;margin-top:4px" onclick="addPorte()">+ Ajouter une porte</button>
      <button class="note-toggle" onclick="toggleNote('note-portes')">✏️ Remarques</button>
      <div class="note-zone hidden" id="note-portes"><textarea placeholder="Remarques portes..."></textarea></div>
    </div>
    <div class="mb">
      <div class="mt">Fenêtres</div>
      <div id="fl"></div>
      <button class="addbtn" style="margin-bottom:0;margin-top:4px" onclick="addFen()">+ Ajouter une fenêtre</button>
      <button class="note-toggle" onclick="toggleNote('note-fenetres')">✏️ Remarques</button>
      <div class="note-zone hidden" id="note-fenetres"><textarea placeholder="Remarques fenêtres..."></textarea></div>
    </div>
    <div class="mb">
      <div class="mt">Volets bois (<span class="euro">90 €/m²</span> · 2 faces)</div>
      <div id="vl"></div>
      <button class="addbtn" style="margin-bottom:0;margin-top:4px" onclick="addVolet()">+ Ajouter un volet</button>
      <button class="note-toggle" onclick="toggleNote('note-volets')">✏️ Remarques</button>
      <div class="note-zone hidden" id="note-volets"><textarea placeholder="Remarques volets..."></textarea></div>
    </div>
  </div>
  <button class="calcbtn" onclick="calc()">Calculer le devis</button>
  <div id="rz" class="hidden">
    <div class="total-block" id="total-block"></div>
    <div class="card"><table class="rt" id="rtbl"></table></div>
    <div class="bottom-actions">
      <button class="btn-secondary" onclick="copyR()">📋 Copier MEG</button>
      <button class="btn-secondary" onclick="exportPDF()">📄 Exporter PDF</button>
    </div>
  </div>
  <div style="height:30px"></div>
</div>

<div class="modal-overlay hidden" id="rename-modal">
  <div class="modal">
    <h3>Nommer le devis</h3>
    <input type="text" id="rename-input" placeholder="Nom du client..." autocomplete="off">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmRename()">Valider</button>
    </div>
  </div>
</div>

<script>
let pricesHidden=false;
let currentDevisId=null;
let pieces=[],pCnt=0,portes=[],ptCnt=0,fens=[],fCnt=0,volets=[],vCnt=0;

const PREST=[
  {id:'detap',    label:'Détapissage',                     pu:5,    u:'m²',zone:'murs'},
  {id:'impres',   label:'Impression glycéro',               pu:6,    u:'m²',zone:'choice'},
  {id:'enduit',   label:'Enduit de rebouchage',             pu:15,   u:'m²',zone:'choice'},
  {id:'peint',    label:'Mise en peinture',                 pu:16.5, u:'m²',zone:'choice'},
  {id:'papier',   label:'Pose papier peint (colle fournie)',pu:55,   u:'m²',zone:'murs'},
  {id:'chaux',    label:'Chaux brossée Ressource',          pu:47,   u:'m²',zone:'murs'},
  {id:'dep_pl',   label:'Dépose et évacuation plinthes',   pu:6,    u:'ML', zone:'ml'},
  {id:'four_pl',  label:'Fourniture plinthe bois',          pu:18,   u:'ML', zone:'ml'},
  {id:'peint_pl2',label:'Peinture plinthe bois',            pu:8,    u:'ML', zone:'ml'},
];
const PRIX_P={
  'classique':{label:'Porte classique',p1:70,p2:140},
  'entree':{label:"Porte d'entrée",p1:150,p2:280},
  'petit_s':{label:'Petit carreau simple',p1:110,p2:220},
  'petit_d':{label:'Petit carreau double',p1:175,p2:350},
  'placard_s':{label:'Placard simple',p1:70,p2:140},
  'placard_d':{label:'Placard double',p1:125,p2:250},
};
const PRIX_F={
  'simple':{label:'Fenêtre simple',p1:70,p2:120},
  'double':{label:'Fenêtre double',p1:140,p2:250},
  'pf_simple':{label:'Porte-fenêtre simple',p1:120,p2:220},
  'pf_double':{label:'Porte-fenêtre double',p1:240,p2:450},
};

function loadHistory(){try{return JSON.parse(localStorage.getItem('cds_history')||'[]');}catch(e){return[];}}
function saveHistory(h){localStorage.setItem('cds_history',JSON.stringify(h));}
function todayStr(){const d=new Date();return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}

function showHistory(){
  saveCurrentDevis();
  document.getElementById('screen-calc').classList.remove('active');
  document.getElementById('screen-history').classList.add('active');
  renderHistory();
}

function renderHistory(){
  const h=loadHistory();
  const c=document.getElementById('hist-list');
  if(h.length===0){c.innerHTML=`<div class="empty-state">Aucun devis enregistré<br>Appuyez sur "+ Nouveau" pour commencer</div>`;return;}
  c.innerHTML=h.map(d=>`
    <div class="hist-item">
      <div class="hist-info">
        <div class="hist-name">${d.name}</div>
        <div class="hist-date">${d.date}</div>
      </div>
      <div class="hist-ttc euro">${d.ttc?d.ttc.toFixed(2)+' €':'—'}</div>
      <div class="hist-actions">
        <button class="hist-btn" onclick="openDevis('${d.id}')">Ouvrir</button>
        <button class="hist-btn red" onclick="deleteDevis('${d.id}')">✕</button>
      </div>
    </div>`).join('');
}

function newDevis(){
  const id='d_'+Date.now();
  const h=loadHistory();
  h.unshift({id,name:'Nouveau devis',date:todayStr(),ttc:null,data:null});
  if(h.length>20)h.splice(20);
  saveHistory(h);
  loadDevis(id);
}

function openDevis(id){loadDevis(id);}

function deleteDevis(id){
  if(!confirm('Supprimer ce devis ?'))return;
  let h=loadHistory();
  h=h.filter(d=>d.id!==id);
  saveHistory(h);
  renderHistory();
}

function loadDevis(id){
  currentDevisId=id;
  const h=loadHistory();
  const entry=h.find(d=>d.id===id)||{name:'Nouveau devis',date:todayStr(),data:null};
  pieces=[];pCnt=0;portes=[];ptCnt=0;fens=[];fCnt=0;volets=[];vCnt=0;
  document.getElementById('f-echaf').checked=false;
  document.getElementById('rz').classList.add('hidden');
  if(entry.data){restoreState(entry.data);}else{addP();}
  document.getElementById('devis-name-display').textContent=entry.name;
  document.getElementById('devis-date-display').textContent=entry.date;
  document.getElementById('screen-history').classList.remove('active');
  document.getElementById('screen-calc').classList.add('active');
}

function saveCurrentDevis(){
  if(!currentDevisId)return;
  const h=loadHistory();
  const idx=h.findIndex(d=>d.id===currentDevisId);
  if(idx===-1)return;
  h[idx].data=captureState();
  if(window._tot)h[idx].ttc=window._tot.ttc;
  saveHistory(h);
}

setInterval(()=>{if(currentDevisId)saveCurrentDevis();},10000);

function captureState(){
  const state={pieces:[],echaf:document.getElementById('f-echaf')?.checked||false,portes:[],fens:[],volets:[],
    note_portes:document.querySelector('#note-portes textarea')?.value||'',
    note_fenetres:document.querySelector('#note-fenetres textarea')?.value||'',
    note_volets:document.querySelector('#note-volets textarea')?.value||'',
    note_portes_open:!document.getElementById('note-portes')?.classList.contains('hidden'),
    note_fenetres_open:!document.getElementById('note-fenetres')?.classList.contains('hidden'),
    note_volets_open:!document.getElementById('note-volets')?.classList.contains('hidden'),
  };
  pieces.forEach(p=>{
    const pi={id:p.id,nom:document.getElementById(`pnom-${p.id}`)?.value||'',
      m1:document.getElementById(`m1-${p.id}`)?.value||'',m2:document.getElementById(`m2-${p.id}`)?.value||'',
      hh:document.getElementById(`hh-${p.id}`)?.value||'',nm:document.getElementById(`nm-${p.id}`)?.value||'4',
      plaf:document.getElementById(`plaf-${p.id}`)?.value||'',haspl:document.getElementById(`has-pl-${p.id}`)?.checked||false,
      note:document.querySelector(`#note-p-${p.id} textarea`)?.value||'',
      note_open:!document.getElementById(`note-p-${p.id}`)?.classList.contains('hidden'),prests:{}};
    PREST.forEach(pr=>{pi.prests[pr.id]={ck:document.getElementById(`ck-${pr.id}-${p.id}`)?.checked||false,zone:document.getElementById(`zone-${pr.id}-${p.id}`)?.value||'murs'};});
    state.pieces.push(pi);
  });
  portes.forEach(p=>{state.portes.push({id:p.id,typ:document.getElementById(`ptyp-${p.id}`)?.value||'classique',qte:document.getElementById(`pqte-${p.id}`)?.value||'1',face:document.getElementById(`pface-${p.id}`)?.value||'2'});});
  fens.forEach(f=>{state.fens.push({id:f.id,typ:document.getElementById(`ftyp-${f.id}`)?.value||'simple',qte:document.getElementById(`fqte-${f.id}`)?.value||'1',face:document.getElementById(`fface-${f.id}`)?.value||'2'});});
  volets.forEach(vo=>{state.volets.push({id:vo.id,l:document.getElementById(`vl-${vo.id}`)?.value||'',h:document.getElementById(`vh-${vo.id}`)?.value||'',q:document.getElementById(`vq-${vo.id}`)?.value||'1'});});
  return state;
}

function restoreState(s){
  document.getElementById('f-echaf').checked=s.echaf||false;
  s.pieces.forEach(pi=>{const id=pi.id;pCnt=Math.max(pCnt,id);pieces.push({id});});
  renderP();
  s.pieces.forEach(pi=>{
    const id=pi.id;
    if(document.getElementById(`pnom-${id}`))document.getElementById(`pnom-${id}`).value=pi.nom||'';
    if(document.getElementById(`m1-${id}`))document.getElementById(`m1-${id}`).value=pi.m1||'';
    if(document.getElementById(`m2-${id}`))document.getElementById(`m2-${id}`).value=pi.m2||'';
    if(document.getElementById(`hh-${id}`))document.getElementById(`hh-${id}`).value=pi.hh||'';
    if(document.getElementById(`nm-${id}`))document.getElementById(`nm-${id}`).value=pi.nm||'4';
    if(document.getElementById(`plaf-${id}`))document.getElementById(`plaf-${id}`).value=pi.plaf||'';
    if(document.getElementById(`has-pl-${id}`))document.getElementById(`has-pl-${id}`).checked=pi.haspl||false;
    if(pi.note&&document.querySelector(`#note-p-${id} textarea`))document.querySelector(`#note-p-${id} textarea`).value=pi.note;
    if(pi.note_open)document.getElementById(`note-p-${id}`)?.classList.remove('hidden');
    PREST.forEach(pr=>{
      const ck=document.getElementById(`ck-${pr.id}-${id}`);
      const zo=document.getElementById(`zone-${pr.id}-${id}`);
      if(ck&&pi.prests&&pi.prests[pr.id])ck.checked=pi.prests[pr.id].ck||false;
      if(zo&&pi.prests&&pi.prests[pr.id])zo.value=pi.prests[pr.id].zone||'murs';
    });
    upd(id);
  });
  s.portes.forEach(p=>{const id=p.id;ptCnt=Math.max(ptCnt,id);portes.push({id});});
  renderPortes();
  s.portes.forEach(p=>{
    if(document.getElementById(`ptyp-${p.id}`))document.getElementById(`ptyp-${p.id}`).value=p.typ||'classique';
    if(document.getElementById(`pqte-${p.id}`))document.getElementById(`pqte-${p.id}`).value=p.qte||'1';
    if(document.getElementById(`pface-${p.id}`))document.getElementById(`pface-${p.id}`).value=p.face||'2';
  });
  s.fens.forEach(f=>{const id=f.id;fCnt=Math.max(fCnt,id);fens.push({id});});
  renderFens();
  s.fens.forEach(f=>{
    if(document.getElementById(`ftyp-${f.id}`))document.getElementById(`ftyp-${f.id}`).value=f.typ||'simple';
    if(document.getElementById(`fqte-${f.id}`))document.getElementById(`fqte-${f.id}`).value=f.qte||'1';
    if(document.getElementById(`fface-${f.id}`))document.getElementById(`fface-${f.id}`).value=f.face||'2';
  });
  s.volets.forEach(vo=>{const id=vo.id;vCnt=Math.max(vCnt,id);volets.push({id});});
  renderVolets();
  s.volets.forEach(vo=>{
    if(document.getElementById(`vl-${vo.id}`))document.getElementById(`vl-${vo.id}`).value=vo.l||'';
    if(document.getElementById(`vh-${vo.id}`))document.getElementById(`vh-${vo.id}`).value=vo.h||'';
    if(document.getElementById(`vq-${vo.id}`))document.getElementById(`vq-${vo.id}`).value=vo.q||'1';
    updVolet(vo.id);
  });
  if(s.note_portes&&document.querySelector('#note-portes textarea'))document.querySelector('#note-portes textarea').value=s.note_portes;
  if(s.note_fenetres&&document.querySelector('#note-fenetres textarea'))document.querySelector('#note-fenetres textarea').value=s.note_fenetres;
  if(s.note_volets&&document.querySelector('#note-volets textarea'))document.querySelector('#note-volets textarea').value=s.note_volets;
  if(s.note_portes_open)document.getElementById('note-portes')?.classList.remove('hidden');
  if(s.note_fenetres_open)document.getElementById('note-fenetres')?.classList.remove('hidden');
  if(s.note_volets_open)document.getElementById('note-volets')?.classList.remove('hidden');
}

function renameDevis(){document.getElementById('rename-input').value=document.getElementById('devis-name-display').textContent;document.getElementById('rename-modal').classList.remove('hidden');setTimeout(()=>document.getElementById('rename-input').focus(),100);}
function closeModal(){document.getElementById('rename-modal').classList.add('hidden');}
function confirmRename(){
  const val=document.getElementById('rename-input').value.trim();
  if(!val){closeModal();return;}
  document.getElementById('devis-name-display').textContent=val;
  const h=loadHistory();const idx=h.findIndex(d=>d.id===currentDevisId);
  if(idx>-1){h[idx].name=val;saveHistory(h);}
  closeModal();
}
document.getElementById('rename-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmRename();});

function addP(){const id=++pCnt;pieces.push({id});renderP();}
function removeP(id){pieces=pieces.filter(p=>p.id!==id);renderP();}

function renderP(){
  const c=document.getElementById('pc');c.innerHTML='';
  pieces.forEach(p=>{
    const prestHTML=PREST.map(pr=>{
      let right='';
      if(pr.zone==='choice')right=`<select class="zsel" id="zone-${pr.id}-${p.id}"><option value="murs">Murs</option><option value="plaf">Plafond</option><option value="both">Les deux</option></select>`;
      else if(pr.zone==='murs')right=`<span class="surf-tag">murs</span>`;
      else if(pr.zone==='ml')right=`<span class="surf-tag">ML auto</span>`;
      return `<div class="prow"><div class="prow-left"><input type="checkbox" id="ck-${pr.id}-${p.id}"><span>${pr.label} (<span class="euro">${pr.pu} €/${pr.u}</span>)</span></div>${right}</div>`;
    }).join('');
    c.innerHTML+=`
    <div class="card" id="pc-${p.id}">
      <div class="ph">
        <input type="text" placeholder="Nom de la pièce (ex: Salon)" id="pnom-${p.id}" style="flex:1;font-size:14px;font-weight:700;border:none;background:transparent;padding:0;color:#1a1a1a">
        <button class="rbtn" onclick="removeP(${p.id})">✕</button>
      </div>
      <div class="sl">Dimensions</div>
      <div class="r4">
        <div><label>Mur 1 (m)</label><input type="number" id="m1-${p.id}" min="0" step="0.1" oninput="upd(${p.id})"></div>
        <div><label>Mur 2 (m)</label><input type="number" id="m2-${p.id}" min="0" step="0.1" oninput="upd(${p.id})"></div>
        <div><label>Hauteur (m)</label><input type="number" id="hh-${p.id}" min="0" step="0.1" placeholder="2.5" oninput="upd(${p.id})"></div>
        <div><label>Nb murs</label><select id="nm-${p.id}" onchange="upd(${p.id})"><option value="4">4</option><option value="3">3</option><option value="2">2</option><option value="1">1</option></select></div>
      </div>
      <div class="r2">
        <div><label>Plafond m² (si diff.)</label><input type="number" id="plaf-${p.id}" min="0" step="0.5" placeholder="auto" oninput="upd(${p.id})"></div>
        <div style="display:flex;align-items:center;gap:8px;padding-top:18px">
          <label class="ck-label"><input type="checkbox" id="has-pl-${p.id}" onchange="upd(${p.id})"> Plinthes</label>
          <span id="ml-prev-${p.id}" style="font-size:11px;color:#888"></span>
        </div>
      </div>
      <div class="prev" id="prev-${p.id}"></div>
      <hr class="div">
      <div class="sl">Prestations à réaliser</div>
      ${prestHTML}
      <button class="note-toggle" onclick="toggleNote('note-p-${p.id}')">✏️ Remarques</button>
      <div class="note-zone hidden" id="note-p-${p.id}"><textarea placeholder="Remarques pour cette pièce..."></textarea></div>
    </div>`;
  });
}

function getSurf(id){
  const m1=parseFloat(document.getElementById(`m1-${id}`)?.value)||0;
  const m2=parseFloat(document.getElementById(`m2-${id}`)?.value)||0;
  const h=parseFloat(document.getElementById(`hh-${id}`)?.value)||2.5;
  const nm=parseInt(document.getElementById(`nm-${id}`)?.value)||4;
  const plafIn=parseFloat(document.getElementById(`plaf-${id}`)?.value)||0;
  const hasPl=document.getElementById(`has-pl-${id}`)?.checked;
  let murs=0,perim=0;
  if(nm===1){murs=m1*h;perim=m1;}
  else if(m1>0&&m2>0){
    if(nm===4){murs=2*(m1+m2)*h;perim=2*(m1+m2);}
    else if(nm===3){murs=(2*m1+m2)*h;perim=2*m1+m2;}
    else{murs=(m1+m2)*h;perim=m1+m2;}
  }
  const plaf=plafIn>0?plafIn:(m1>0&&m2>0?m1*m2:0);
  const ml=hasPl?perim:0;
  return{murs:parseFloat(murs.toFixed(2)),plaf:parseFloat(plaf.toFixed(2)),ml:parseFloat(ml.toFixed(2))};
}

function upd(id){
  const s=getSurf(id);
  const prev=document.getElementById(`prev-${id}`);
  if(prev){let t='';if(s.murs>0)t+=`Murs : ${s.murs.toFixed(1)} m²`;if(s.plaf>0)t+=(t?' · ':'')+`Plafond : ${s.plaf.toFixed(1)} m²`;prev.textContent=t;}
  const mlp=document.getElementById(`ml-prev-${id}`);
  if(mlp)mlp.textContent=s.ml>0?`→ ${s.ml.toFixed(1)} ML`:'';
}

function getQte(pr,pid){
  const s=getSurf(pid);
  if(pr.zone==='murs')return s.murs;
  if(pr.zone==='plaf')return s.plaf;
  if(pr.zone==='ml')return s.ml;
  if(pr.zone==='choice'){
    const z=document.getElementById(`zone-${pr.id}-${pid}`)?.value||'murs';
    if(z==='murs')return s.murs;if(z==='plaf')return s.plaf;if(z==='both')return parseFloat((s.murs+s.plaf).toFixed(2));
  }
  return 0;
}

function getZL(pr,pid){
  if(pr.zone==='murs')return 'murs';if(pr.zone==='plaf')return 'plafond';if(pr.zone==='ml')return '';
  if(pr.zone==='choice'){const z=document.getElementById(`zone-${pr.id}-${pid}`)?.value||'murs';if(z==='murs')return 'murs';if(z==='plaf')return 'plafond';if(z==='both')return 'murs + plafond';}
  return '';
}

function v(id){const e=document.getElementById(id);return e?parseFloat(e.value)||0:0;}
function chk(id){const e=document.getElementById(id);return e?e.checked:false;}

function addPorte(){const id=++ptCnt;portes.push({id});renderPortes();}
function removePorte(id){portes=portes.filter(p=>p.id!==id);renderPortes();}
function renderPortes(){
  const c=document.getElementById('pl');c.innerHTML='';
  portes.forEach(p=>{c.innerHTML+=`
    <div class="men-row">
      <div><label>Type</label><select id="ptyp-${p.id}"><option value="classique">Porte classique</option><option value="entree">Porte d'entrée</option><option value="petit_s">Petit carreau simple</option><option value="petit_d">Petit carreau double</option><option value="placard_s">Placard simple</option><option value="placard_d">Placard double</option></select></div>
      <div><label>Qté</label><input type="number" id="pqte-${p.id}" min="1" value="1" step="1"></div>
      <div><label>Faces</label><select id="pface-${p.id}"><option value="2">2 faces</option><option value="1">1 face</option></select></div>
      <button class="rbtn" style="padding-bottom:6px" onclick="removePorte(${p.id})">✕</button>
    </div>`;});
}

function addFen(){const id=++fCnt;fens.push({id});renderFens();}
function removeFen(id){fens=fens.filter(f=>f.id!==id);renderFens();}
function renderFens(){
  const c=document.getElementById('fl');c.innerHTML='';
  fens.forEach(f=>{c.innerHTML+=`
    <div class="men-row">
      <div><label>Type</label><select id="ftyp-${f.id}"><option value="simple">Fenêtre simple</option><option value="double">Fenêtre double</option><option value="pf_simple">Porte-fenêtre simple</option><option value="pf_double">Porte-fenêtre double</option></select></div>
      <div><label>Qté</label><input type="number" id="fqte-${f.id}" min="1" value="1" step="1"></div>
      <div><label>Faces</label><select id="fface-${f.id}"><option value="2">2 faces</option><option value="1">1 face</option></select></div>
      <button class="rbtn" style="padding-bottom:6px" onclick="removeFen(${f.id})">✕</button>
    </div>`;});
}

function addVolet(){const id=++vCnt;volets.push({id});renderVolets();}
function removeVolet(id){volets=volets.filter(v=>v.id!==id);renderVolets();}
function renderVolets(){
  const c=document.getElementById('vl');c.innerHTML='';
  volets.forEach(vo=>{c.innerHTML+=`
    <div class="volet-row">
      <div><label>Largeur (m)</label><input type="number" id="vl-${vo.id}" min="0" step="0.01" oninput="updVolet(${vo.id})"></div>
      <div><label>Hauteur (m)</label><input type="number" id="vh-${vo.id}" min="0" step="0.01" oninput="updVolet(${vo.id})"></div>
      <div><label>m² 2f</label><input type="text" id="vs-${vo.id}" readonly style="background:#f0f0f0;color:#888;text-align:center" value="—"></div>
      <div><label>Qté</label><input type="number" id="vq-${vo.id}" min="1" value="1" step="1"></div>
      <button class="rbtn" style="padding-bottom:6px" onclick="removeVolet(${vo.id})">✕</button>
    </div>`;});
}

function updVolet(id){
  const l=parseFloat(document.getElementById(`vl-${id}`)?.value)||0;
  const h=parseFloat(document.getElementById(`vh-${id}`)?.value)||0;
  const surf=parseFloat((l*h*2).toFixed(2));
  const el=document.getElementById(`vs-${id}`);
  if(el)el.value=surf>0?`${surf} m²`:'—';
}

function toggleNote(id){document.getElementById(id).classList.toggle('hidden');}
function togglePrices(){pricesHidden=!pricesHidden;document.body.classList.toggle('hide-prices',pricesHidden);document.getElementById('eyeText').textContent=pricesHidden?'Afficher':'Masquer';}

function buildRows(){
  let rows=[],total=0;
  pieces.forEach(p=>{
    const nom=document.getElementById(`pnom-${p.id}`)?.value||`Pièce ${p.id}`;
    rows.push({type:'section',label:nom.toUpperCase()});
    let hasRows=false;
    PREST.forEach(pr=>{
      if(!chk(`ck-${pr.id}-${p.id}`))return;
      const qte=getQte(pr,p.id);if(qte<=0)return;
      const montant=parseFloat((qte*pr.pu).toFixed(2));
      const zl=getZL(pr,p.id);
      rows.push({label:zl?`${pr.label} — ${zl}`:pr.label,qte,unite:pr.u,pu:pr.pu,montant});
      total+=montant;hasRows=true;
    });
    const noteVal=document.querySelector(`#note-p-${p.id} textarea`)?.value||'';
    if(noteVal.trim())rows.push({type:'note',label:noteVal});
    if(!hasRows&&!noteVal)rows.pop();
  });
  if(chk('f-echaf')){rows.push({type:'section',label:'FORFAITS'});rows.push({label:'Montage/démontage échafaudage',qte:1,unite:'forfait',pu:450,montant:450});total+=450;}
  const pA=portes.filter(p=>v(`pqte-${p.id}`)>0);
  const fA=fens.filter(f=>v(`fqte-${f.id}`)>0);
  const vA=volets.filter(vo=>v(`vl-${vo.id}`)>0&&v(`vh-${vo.id}`)>0);
  if(pA.length||fA.length||vA.length){
    rows.push({type:'section',label:'MENUISERIES & VOLETS'});
    pA.forEach(p=>{const typ=document.getElementById(`ptyp-${p.id}`)?.value||'classique';const faces=parseInt(document.getElementById(`pface-${p.id}`)?.value)||2;const qte=v(`pqte-${p.id}`);const info=PRIX_P[typ];const pu=faces===1?info.p1:info.p2;const m=parseFloat((qte*pu).toFixed(2));rows.push({label:`${info.label} ${faces}f`,qte,unite:'u',pu,montant:m});total+=m;});
    fA.forEach(f=>{const typ=document.getElementById(`ftyp-${f.id}`)?.value||'simple';const faces=parseInt(document.getElementById(`fface-${f.id}`)?.value)||2;const qte=v(`fqte-${f.id}`);const info=PRIX_F[typ];const pu=faces===1?info.p1:info.p2;const m=parseFloat((qte*pu).toFixed(2));rows.push({label:`${info.label} ${faces}f`,qte,unite:'u',pu,montant:m});total+=m;});
    vA.forEach(vo=>{const l=v(`vl-${vo.id}`),h=v(`vh-${vo.id}`),q=v(`vq-${vo.id}`)||1;const surfUnit=parseFloat((l*h*2).toFixed(2));const surfTotal=parseFloat((surfUnit*q).toFixed(2));const montant=parseFloat((surfTotal*90).toFixed(2));rows.push({label:`Volet bois ${l}×${h}m (×${q})`,qte:surfTotal,unite:'m²',pu:90,montant});total+=montant;});
    ['portes','fenetres','volets'].forEach(k=>{const n=document.querySelector(`#note-${k} textarea`)?.value||'';if(n.trim())rows.push({type:'note',label:n});});
  }
  total=parseFloat(total.toFixed(2));
  const tva=parseFloat((total*0.10).toFixed(2));
  const ttc=parseFloat((total+tva).toFixed(2));
  return{rows,total,tva,ttc};
}

function calc(){
  const{rows,total,tva,ttc}=buildRows();
  window._rows=rows;window._tot={total,tva,ttc};
  document.getElementById('total-block').innerHTML=`
    <div class="line"><span>Total HT</span><span class="euro">${total.toFixed(2)} €</span></div>
    <div class="line"><span>TVA 10%</span><span class="euro">${tva.toFixed(2)} €</span></div>
    <div class="line big"><span>Total TTC</span><span class="euro">${ttc.toFixed(2)} €</span></div>`;
  let html=`<tr><th>Désignation</th><th class="rr">Qté</th><th class="rr">Unité</th><th class="rr euro">PU HT</th><th class="rr euro">Montant HT</th></tr>`;
  rows.forEach(r=>{
    if(r.type==='section')html+=`<tr class="sr"><td colspan="5">${r.label}</td></tr>`;
    else if(r.type==='note')html+=`<tr><td colspan="5" style="color:#888;font-style:italic;font-size:11px">${r.label.replace(/\n/g,'<br>')}</td></tr>`;
    else html+=`<tr><td>${r.label}</td><td class="rr">${r.qte}</td><td class="rr">${r.unite}</td><td class="rr euro">${r.pu.toFixed(2)} €</td><td class="rr euro">${r.montant.toFixed(2)} €</td></tr>`;
  });
  document.getElementById('rtbl').innerHTML=html;
  document.getElementById('rz').classList.remove('hidden');
  saveCurrentDevis();
}

function copyR(){
  const rows=window._rows||[];const t=window._tot||{};
  let txt=`RÉCAP DEVIS — COULEURS DU SUD\n${document.getElementById('devis-name-display').textContent} — ${document.getElementById('devis-date-display').textContent}\n${'─'.repeat(52)}\n`;
  rows.forEach(r=>{
    if(r.type==='section')txt+=`\n${r.label}\n`;
    else if(r.type==='note')txt+=`  → ${r.label}\n`;
    else txt+=`${r.label.padEnd(40)}${String(r.qte).padStart(6)} ${r.unite.padEnd(7)} ${r.pu.toFixed(0).padStart(5)}€  →  ${r.montant.toFixed(2)} €\n`;
  });
  txt+=`\n${'─'.repeat(52)}\nTotal HT : ${t.total?.toFixed(2)} €\nTVA 10%  : ${t.tva?.toFixed(2)} €\nTotal TTC: ${t.ttc?.toFixed(2)} €\n`;
  navigator.clipboard.writeText(txt).then(()=>{alert('Copié !');});
}

function exportPDF(){
  const{rows,total,tva,ttc}=buildRows();
  const name=document.getElementById('devis-name-display').textContent;
  const date=document.getElementById('devis-date-display').textContent;
  const showPrices=!pricesHidden;
  const rowsHTML=rows.map(r=>{
    if(r.type==='section')return`<tr style="background:#f5f4f0"><td colspan="5" style="padding:5px 8px;font-weight:700;font-size:11px;color:#666">${r.label}</td></tr>`;
    if(r.type==='note')return`<tr><td colspan="5" style="padding:4px 8px;color:#888;font-style:italic;font-size:11px">${r.label.replace(/\n/g,'<br>')}</td></tr>`;
    return`<tr><td style="padding:5px 8px;border-bottom:1px solid #f0f0f0">${r.label}</td><td style="padding:5px 8px;border-bottom:1px solid #f0f0f0;text-align:right">${r.qte}</td><td style="padding:5px 8px;border-bottom:1px solid #f0f0f0;text-align:right">${r.unite}</td><td style="padding:5px 8px;border-bottom:1px solid #f0f0f0;text-align:right">${showPrices?r.pu.toFixed(2)+' €':'—'}</td><td style="padding:5px 8px;border-bottom:1px solid #f0f0f0;text-align:right">${showPrices?r.montant.toFixed(2)+' €':'—'}</td></tr>`;
  }).join('');
  const totauxHTML=showPrices?`<div style="margin-top:16px;background:#1a1a1a;color:#fff;padding:14px 16px;border-radius:8px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Total HT</span><span>${total.toFixed(2)} €</span></div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>TVA 10%</span><span>${tva.toFixed(2)} €</span></div><div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin-top:8px;padding-top:8px;border-top:1px solid #444"><span>Total TTC</span><span>${ttc.toFixed(2)} €</span></div></div>`:'';
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Devis ${name}</title><style>body{font-family:-apple-system,Arial,sans-serif;color:#1a1a1a;padding:24px;font-size:13px}h1{font-size:18px;font-weight:700}h2{font-size:13px;color:#999;font-weight:400;margin-top:2px}table{width:100%;border-collapse:collapse;margin-top:16px}th{text-align:left;font-size:10px;color:#999;font-weight:700;padding:5px 8px;border-bottom:1px solid #ddd}@media print{body{padding:0}}</style></head><body><h1>Devis — ${name}</h1><h2>SAS Couleurs du Sud · ${date}</h2><table><thead><tr><th>Désignation</th><th style="text-align:right">Qté</th><th style="text-align:right">Unité</th><th style="text-align:right">PU HT</th><th style="text-align:right">Montant HT</th></tr></thead><tbody>${rowsHTML}</tbody></table>${totauxHTML}</body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`Devis_${name.replace(/\s+/g,'_')}_${date.replace(/\//g,'-')}.html`;
  a.click();URL.revokeObjectURL(url);
}

renderHistory();
</script>
